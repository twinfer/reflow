// Reflow ClusterCtl service — the cluster-operator surface.
//
// ClusterCtl owns the *physical* cluster operations: node membership,
// partition topology, DR snapshots, and LP routing transfers. It is
// the cluster-admin counterpart to reflow.config.v1.Config (which owns
// app config — handler deployments, event sources, webhooks, secrets).
// The naming mirrors Restate, where `cluster-ctrl` is the
// cluster-administrator surface and `admin` is the app-config surface.
//
// Every reflowd process hosts a ClusterCtl Connect RPC server on a
// dedicated port (typically :8082). The server is mTLS-protected; the
// caller's leaf CN encodes its principal Raw form (e.g.
// `operator/<name>` for operators). The `reflowd cluster ...` CLI is
// the canonical client. SelfJoin has a narrower carve-out: it accepts
// a `node/*` principal, but only when the principal's NodeID equals
// req.node_id (defense in depth behind the path-based authz rule).
//
// Authorization lives in internal/auth (the shared starter authz policy
// consumed by both the gRPC delivery interceptor and the Connect HTTP
// middleware). The starter policy restricts
// /reflow.clusterctl.v1.ClusterCtl/* to principals matching
// "operator/*", with the SelfJoin carve-out described above.
//
// Mutating RPCs (AddNode, RemoveNode, TransferLP, CreateSnapshot,
// DeleteSnapshot) translate to shard-0 Raft proposals; the apply arms
// in the metadata FSM and the metadata-leader rebalancer drive the
// rest. Read RPCs (ListNodes, ListPartitions, ListSnapshots,
// ListLPTransfers) issue a SyncRead against shard 0 or the local
// SnapshotRepository.

syntax = "proto3";

package reflow.clusterctl.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflow/proto/clusterctlv1;clusterctlv1";

service ClusterCtl {
  // AddNode registers a new peer with shard 0 and enqueues a rebalance
  // sequence to give the new node a non-voting replica of every
  // existing partition shard. The non-voting replica is promoted to a
  // voter after dragonboat reports catch-up.
  rpc AddNode(AddNodeRequest) returns (AddNodeResponse);
  // SelfJoin is AddNode initiated by the joiner itself. Authorized when
  // the caller's leaf-CN principal is "node/<req.node_id>"; any other
  // principal is rejected. Same payload and FSM effect as AddNode —
  // the two methods exist as distinct authorization paths so the
  // authz policy can gate them by role (operator/* vs node/<id>).
  // Idempotent: the underlying RegisterNode + BeginRebalanceStep apply
  // arms upsert/dedup.
  rpc SelfJoin(AddNodeRequest) returns (AddNodeResponse);
  // RemoveNode marks a peer as evicted in shard 0. The rebalancer
  // observes and walks the dragonboat membership-change sequence
  // (DELETE_REPLICA for every shard the node hosted).
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);
  // ListNodes returns the current NodeMembership records from shard 0.
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  // ListPartitions returns the current PartitionTable from shard 0.
  rpc ListPartitions(ListPartitionsRequest) returns (ListPartitionsResponse);
  // CreateSnapshot kicks off an Exported snapshot of the requested
  // partition shard and archives the result via the local
  // SnapshotRepository. Returns the snapshot index.
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  // ListSnapshots enumerates archived snapshots for a partition shard.
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
  // DeleteSnapshot removes a single archived snapshot. Idempotent —
  // returns OK when the snapshot is already absent.
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  // TransferLP initiates a cross-shard transfer of one logical
  // partition. Validates inputs, mints a UUIDv4 transfer_id, and
  // proposes Command_InitiateLPTransfer to shard 0. The lpMover on the
  // metadata leader then drives the saga (freeze → ship → stage →
  // flip → cleanup). Returns immediately with the transfer_id; the
  // caller polls ListLPTransfers to observe progress. Leader-only.
  rpc TransferLP(TransferLPRequest) returns (TransferLPResponse);
  // ListLPTransfers returns the current LPTransferTable rows plus the
  // table revision. Reads via SyncRead against shard 0.
  rpc ListLPTransfers(ListLPTransfersRequest) returns (ListLPTransfersResponse);
  // RebalanceAdvise returns the autonomous rebalancer's view of the
  // cluster as of the call: current skew, drained shards, per-shard LP
  // counts, and (in `would_transfer`) the moves the rebalancer would
  // propose right now under hysteresis-free evaluation. Read-only —
  // any peer can answer; SyncReads route to the local shard-0 replica.
  rpc RebalanceAdvise(RebalanceAdviseRequest) returns (RebalanceAdviseResponse);
  // RebalanceDrain adds or removes a partition shard from the
  // RebalanceDrainTable. drain=true marks the shard drained (its LPs
  // get re-planned off); drain=false un-drains. Idempotent. CAS via
  // if_table_revision_eq; mismatch returns FailedPrecondition.
  // Leader-only.
  rpc RebalanceDrain(RebalanceDrainRequest) returns (RebalanceDrainResponse);

  // UpsertTenant inserts or replaces one row in shard 0's TenantTable.
  // The server pre-allocates record.id by reading the current
  // TenantList: if a row with record.name already exists, it reuses
  // that id (update path); otherwise it allocates max(existing.id)+1
  // (create path). On create, the assigned id is returned in
  // UpsertTenantResponse.tenant_id. CAS via if_table_revision_eq
  // (caller must pass the revision they read in the same
  // ListTenants call so a racing operator's concurrent edit
  // reproducibly conflicts). Leader-only. Tenants live alongside
  // membership/partitions on the ClusterCtl surface because they are
  // a platform-admin concern; tenant-scoped app config (deployments,
  // event sources, webhooks, secrets) lives on the Config service.
  rpc UpsertTenant(UpsertTenantRequest) returns (UpsertTenantResponse);
  // DeleteTenant removes one row from shard 0's TenantTable by id.
  // Same CAS semantics as UpsertTenant. Delete-of-absent succeeds
  // (and bumps the revision so the operator's CLI sees the proposal
  // landed). Does NOT cascade-delete the tenant's data (invocations,
  // journal entries, DEK record) — operators clean up via a follow-up
  // TenantDEK delete + per-tenant range-delete pass. Leader-only.
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
  // ListTenants returns every TenantRecord plus the table's CAS
  // revision in one SyncRead. Reads from any peer.
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  // DescribeTenant returns one TenantRecord by id, or CodeNotFound.
  // Reads via SyncRead.
  rpc DescribeTenant(DescribeTenantRequest) returns (DescribeTenantResponse);

  // UpsertTenantDEK inserts or replaces one row in shard 0's
  // TenantDEKTable. The DEK plaintext never traverses Raft — the
  // record carries a gocloud.dev/blob URI for the ciphertext and a
  // Tink KMS URI for the KEK that unwraps it. Per-node
  // internal/secretstore.TenantDEKResolver fetches + decrypts at
  // reconcile time and materializes a tink.AEAD primitive cached
  // under record.tenant_id. CAS via if_table_revision_eq. Leader-only.
  // Server rejects record.tenant_id == 0 (the default tenant uses a
  // built-in cluster-wide AEAD, not a TenantDEKTable row).
  rpc UpsertTenantDEK(UpsertTenantDEKRequest) returns (UpsertTenantDEKResponse);
  // DeleteTenantDEK removes one row from shard 0's TenantDEKTable.
  // Same CAS semantics as UpsertTenantDEK. Delete-of-absent succeeds
  // (and bumps the revision). This is the second of the two-step
  // tenant-wipe procedure — running it makes the tenant's data
  // permanently unrecoverable (the DEK is gone). Leader-only.
  rpc DeleteTenantDEK(DeleteTenantDEKRequest) returns (DeleteTenantDEKResponse);
  // ListTenantDEKs returns every TenantDEKRecord plus the table's CAS
  // revision in one SyncRead. Reads from any peer.
  rpc ListTenantDEKs(ListTenantDEKsRequest) returns (ListTenantDEKsResponse);
}

message AddNodeRequest {
  uint64 node_id = 1;
  string raft_addr = 2;
  string gossip_addr = 3;
  string grpc_endpoint = 4;
  string node_host_id = 5;
}
message AddNodeResponse {
  // assignment_epoch after the new node was registered. The caller can
  // poll ListPartitions until shards converge.
  uint64 assignment_epoch = 1;
}

message RemoveNodeRequest {
  uint64 node_id = 1;
}
message RemoveNodeResponse {
  uint64 assignment_epoch = 1;
}

message ListNodesRequest {}
message ListNodesResponse {
  repeated reflow.engine.v1.NodeMembership nodes = 1;
}

message ListPartitionsRequest {}
message ListPartitionsResponse {
  reflow.engine.v1.PartitionTable table = 1;
}

message CreateSnapshotRequest {
  uint64 shard_id = 1;
}
message CreateSnapshotResponse {
  uint64 shard_id = 1;
  uint64 index = 2;
  int64 size_bytes = 3;
}

message ListSnapshotsRequest {
  uint64 shard_id = 1;
}
message SnapshotRef {
  uint64 shard_id = 1;
  uint64 index = 2;
  int64 size_bytes = 3;
  int64 created_at_unix_ms = 4;
}
message ListSnapshotsResponse {
  repeated SnapshotRef snapshots = 1;
}

message DeleteSnapshotRequest {
  uint64 shard_id = 1;
  uint64 index = 2;
}
message DeleteSnapshotResponse {}

// TransferLPRequest initiates a cross-shard transfer for one LP. lp
// must be in [0, LPCount); dest_shard must be a known partition shard
// id. The request fails (FailedPrecondition) if a non-terminal
// transfer for the same lp already exists.
message TransferLPRequest {
  uint32 lp = 1;
  uint64 dest_shard = 2;
}
message TransferLPResponse {
  string transfer_id = 1;
}

message ListLPTransfersRequest {}
message ListLPTransfersResponse {
  repeated reflow.engine.v1.LPTransferRecord records = 1;
  uint64 table_revision = 2;
}

// RebalanceMove describes one prospective LP→shard transfer in
// RebalanceAdviseResponse. Same shape as routing.LPMove on the engine
// side.
message RebalanceMove {
  uint32 lp = 1;
  uint64 from_shard = 2;
  uint64 to_shard = 3;
}

// RebalanceAdviseRequest carries no parameters; the rebalancer's
// configuration is server-side.
message RebalanceAdviseRequest {}
message RebalanceAdviseResponse {
  // mode is the running mode: "off", "advisory", or "auto".
  string mode = 1;
  // engaged reports whether the rebalancer would consider the cluster
  // "engaged" right now — i.e., whether skew_pct ≥ engage_pct. The
  // server-side advice path evaluates without hysteresis carry-over;
  // operators get the fresh-view answer.
  bool engaged = 2;
  // skew_pct is the mis-placement percentage on a 0..100 scale.
  double skew_pct = 3;
  // in_flight is the count of non-terminal LP transfers right now.
  uint32 in_flight = 4;
  // skipped_reason is non-empty when would_transfer is empty;
  // explains which gate fired (skew_below_engage, cooldown,
  // at_capacity, no_moves, no_live_shards, no_planner).
  string skipped_reason = 5;
  // drained_shards lists the shard ids currently in the
  // RebalanceDrainTable.
  repeated uint64 drained_shards = 6;
  // lps_per_shard maps shard_id → owned-LP count from the
  // LPOwnersTable snapshot the advisor observed.
  map<uint64, uint32> lps_per_shard = 7;
  // would_transfer is the move set the rebalancer would actuate on
  // this tick (up to max_concurrent − in_flight elements). In auto
  // mode the balancer has likely already proposed these; in advisory
  // mode the list is the planner's intent.
  repeated RebalanceMove would_transfer = 8;
}

// RebalanceDrainRequest sets or clears a drain marker for one
// partition shard.
message RebalanceDrainRequest {
  uint64 shard_id = 1;
  bool drain = 2;
  // if_table_revision_eq, when non-zero, gates the apply on the
  // current RebalanceDrainTable revision matching this value (CAS).
  uint64 if_table_revision_eq = 3;
}
message RebalanceDrainResponse {
  // table_revision is the post-apply RebalanceDrainTable revision so
  // callers can chain CAS roundtrips.
  uint64 table_revision = 1;
}

// UpsertTenantRequest carries one TenantRecord plus an optional CAS
// guard. record.id may be 0 (the server allocates an id from
// max(existing.id)+1 before propose) or non-zero (update). name must
// be non-empty.
message UpsertTenantRequest {
  reflow.engine.v1.TenantRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
// UpsertTenantResponse echoes the assigned tenant_id (always populated,
// even on update) and the post-apply table revision.
message UpsertTenantResponse {
  uint32 tenant_id = 1;
  uint64 table_revision = 2;
}

message DeleteTenantRequest {
  uint32 tenant_id = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteTenantResponse {
  uint64 table_revision = 1;
}

message ListTenantsRequest {}
message ListTenantsResponse {
  repeated reflow.engine.v1.TenantRecord tenants = 1;
  uint64 table_revision = 2;
}

message DescribeTenantRequest {
  uint32 tenant_id = 1;
}
message DescribeTenantResponse {
  reflow.engine.v1.TenantRecord tenant = 1;
}

// UpsertTenantDEKRequest carries one TenantDEKRecord plus an optional
// CAS guard. record.tenant_id must be non-zero (the FSM rejects 0).
// record.name is the AAD used for KEK→DEK unwrap; rotation writes a
// new record with a new name and a new ciphertext blob.
message UpsertTenantDEKRequest {
  reflow.engine.v1.TenantDEKRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertTenantDEKResponse {
  uint64 table_revision = 1;
}

message DeleteTenantDEKRequest {
  uint32 tenant_id = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteTenantDEKResponse {
  uint64 table_revision = 1;
}

message ListTenantDEKsRequest {}
message ListTenantDEKsResponse {
  repeated reflow.engine.v1.TenantDEKRecord tenant_deks = 1;
  uint64 table_revision = 2;
}

// LeaderHint is attached as a connect.Error detail on
// connect.CodeUnavailable returned by mutating ClusterCtl RPCs when
// the receiving node is not the metadata leader. Clients (joiner's
// SelfJoin caller and the `reflowd cluster ...` CLI) extract it, dial
// admin_endpoint, retry.
message LeaderHint {
  uint64 node_id = 1;
  string admin_endpoint = 2;
}
