// Reflow Config service — the app-config surface.
//
// Config owns the *logical* config that shapes what runs on the
// cluster: handler deployments, event-source bindings, inbound
// webhook bindings, and the named-secret table consumers reference.
// It is the developer-facing counterpart to
// reflow.clusterctl.v1.ClusterCtl (which owns cluster topology, DR,
// and routing). Naming mirrors Restate's split between
// `cluster-ctrl` (cluster admin) and `admin` (app config), with the
// terminology flipped to avoid the overloaded word "admin".
//
// Every reflowd process hosts a Config Connect RPC server on the
// admin listener (same port as ClusterCtl in step 1; a follow-on may
// move Config onto its own port if/when we want different network
// exposure). The server is mTLS-protected; today's starter policy
// gates /reflow.config.v1.Config/* to operator/* principals — same as
// ClusterCtl. The separation of services is the seam for later
// delegating Config to a narrower credential (tenant admin, CI
// service account) without loosening cluster-control authority.
//
// All mutating RPCs propose Command_* commands to shard 0 with a
// table-revision CAS guard (if_table_revision_eq=0 disables CAS); the
// FSM signals a CAS mismatch via Result.Value =
// ResultValueFailedPrecondition, which the server surfaces as
// connect.CodeFailedPrecondition. Read RPCs route to a local shard-0
// replica via SyncRead.

syntax = "proto3";

package reflow.config.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflow/proto/configv1;configv1";

service Config {
  // RegisterDeployment introduces a new handler deployment to the
  // cluster. The engine dials <url>, issues a discovery GET to
  // enumerate handlers, validates the protocol version, mints a
  // UUIDv4 deployment_id, and proposes Command_RegisterDeployment to
  // shard 0. Returns the assigned id. URL must use http:// or
  // https://.
  rpc RegisterDeployment(RegisterDeploymentRequest) returns (RegisterDeploymentResponse);

  // ListDeployments returns every DeploymentRecord in shard 0 plus the
  // deployment table revision. Reads via SyncRead — any peer can
  // serve. Operators use the returned revision as if_table_revision_eq
  // on subsequent Delete calls.
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);

  // DescribeDeployment returns one DeploymentRecord by id, or
  // CodeNotFound. Reads via SyncRead.
  rpc DescribeDeployment(DescribeDeploymentRequest) returns (DescribeDeploymentResponse);

  // DeleteDeployment removes one DeploymentRecord from shard 0 and
  // evicts any (service, handler) → id index entries that pointed to
  // it. Leader-only. force must be true; without it the server returns
  // CodeFailedPrecondition because deleting a deployment is destructive
  // — in-flight invocations resolve their deployment record per
  // stream-open, and a delete breaks any open or replaying invocation
  // pinned to this id. force is the operator's "yes I accept the
  // risk" acknowledgement; reflow does not currently scan partitions
  // for active references.
  rpc DeleteDeployment(DeleteDeploymentRequest) returns (DeleteDeploymentResponse);

  // UpsertEventSource inserts or replaces one row in shard 0's
  // EventSourceTable. if_table_revision_eq=0 disables CAS; non-zero
  // requires the table revision to match (CodeFailedPrecondition on
  // mismatch). Returns the post-apply table revision. Leader-only.
  rpc UpsertEventSource(UpsertEventSourceRequest) returns (UpsertEventSourceResponse);
  // DeleteEventSource removes one row from shard 0's EventSourceTable.
  // Same CAS semantics as UpsertEventSource. Delete-of-absent
  // succeeds (and bumps the revision). Leader-only.
  rpc DeleteEventSource(DeleteEventSourceRequest) returns (DeleteEventSourceResponse);
  // ListEventSources returns the current EventSourceTable rows plus
  // the table revision. Reads via SyncRead against shard 0 — any
  // peer can serve. Operators use the returned revision as
  // if_table_revision_eq on subsequent Upsert/Delete calls.
  rpc ListEventSources(ListEventSourcesRequest) returns (ListEventSourcesResponse);

  // UpsertWebhookSource / DeleteWebhookSource / ListWebhookSources
  // mirror the event-source trio against shard 0's
  // WebhookSourceTable. The record's secret_name references a row in
  // the shard-0 SecretTable (UpsertSecret below); the webhook record
  // carries no ciphertext or KMS material itself. Leader-only for
  // mutating calls; List is SyncRead from any peer.
  rpc UpsertWebhookSource(UpsertWebhookSourceRequest) returns (UpsertWebhookSourceResponse);
  rpc DeleteWebhookSource(DeleteWebhookSourceRequest) returns (DeleteWebhookSourceResponse);
  rpc ListWebhookSources(ListWebhookSourcesRequest) returns (ListWebhookSourcesResponse);

  // UpsertSecret / DeleteSecret / ListSecrets mirror the same trio
  // against shard 0's SecretTable. Each SecretRecord references a
  // ciphertext blob (gocloud.dev/blob URI) and a KEK (Tink KMS URI);
  // the plaintext never traverses Raft. Per-node
  // internal/secretstore Reconcilers fetch + decrypt at reconcile
  // time and surface bytes via in-memory Lookup. Leader-only for
  // mutating calls; List is SyncRead.
  rpc UpsertSecret(UpsertSecretRequest) returns (UpsertSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // Audit log read access. Operator-facing query over shard 0's
  // AuditLogTable; rows are written from the FSM apply path in the
  // same Batch as the config mutation they audit. SyncRead — any peer
  // can serve. Returns rows in raft_index ascending order; the caller
  // narrows via since_ms / until_ms / tenant_id / action_kind filters
  // and the optional limit. A returned `more` flag indicates the
  // limit was reached before the filter range was exhausted.
  rpc ListAuditLog(ListAuditLogRequest) returns (ListAuditLogResponse);

  // UpsertCARoot / DeleteCARoot / ListCARoots mirror the secret trio
  // against shard 0's CARootTable. Each CARootRecord carries a CA
  // cert (PEM) plus a pointer to the SecretTable row holding the
  // AEAD-wrapped signing key. The signing key never traverses Raft.
  // Per-node certmgr.ClusterIssuer fetches + decrypts via
  // secretstore.LookupForCASigning at reconcile time. Leader-only for
  // mutating calls; List is SyncRead.
  rpc UpsertCARoot(UpsertCARootRequest) returns (UpsertCARootResponse);
  rpc DeleteCARoot(DeleteCARootRequest) returns (DeleteCARootResponse);
  rpc ListCARoots(ListCARootsRequest) returns (ListCARootsResponse);
}

// RegisterDeploymentRequest names a handler endpoint reachable over
// HTTP/2. URL scheme must be http:// or https://; the engine dials
// the handler via Connect RPC.
message RegisterDeploymentRequest {
  string url = 1;
  // Optional per-invocation cap on journal entries for this
  // deployment. 0 = engine default (10_000). The engine clamps to a
  // hard ceiling (100_000).
  uint32 max_journal_entries = 2;
}

message RegisterDeploymentResponse {
  string deployment_id = 1;
}

message ListDeploymentsRequest {}
message ListDeploymentsResponse {
  repeated reflow.engine.v1.DeploymentRecord deployments = 1;
  uint64 table_revision = 2;
}

message DescribeDeploymentRequest {
  string deployment_id = 1;
}
message DescribeDeploymentResponse {
  reflow.engine.v1.DeploymentRecord deployment = 1;
}

// DeleteDeploymentRequest names one deployment by id. force must be
// true to confirm the operator accepts that in-flight invocations
// referencing this deployment may break. if_table_revision_eq=0
// disables CAS; non-zero requires the deployment table revision to
// match (CodeFailedPrecondition on mismatch).
message DeleteDeploymentRequest {
  string deployment_id = 1;
  bool force = 2;
  uint64 if_table_revision_eq = 3;
}
message DeleteDeploymentResponse {
  uint64 table_revision = 1;
}

// UpsertEventSourceRequest carries one EventSourceRecord plus an
// optional CAS guard. if_table_revision_eq=0 disables CAS.
message UpsertEventSourceRequest {
  reflow.engine.v1.EventSourceRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertEventSourceResponse {
  uint64 table_revision = 1;
}

message DeleteEventSourceRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteEventSourceResponse {
  uint64 table_revision = 1;
}

message ListEventSourcesRequest {}
message ListEventSourcesResponse {
  repeated reflow.engine.v1.EventSourceRecord sources = 1;
  uint64 table_revision = 2;
}

// UpsertWebhookSourceRequest carries one WebhookSourceRecord plus an
// optional CAS guard. if_table_revision_eq=0 disables CAS.
message UpsertWebhookSourceRequest {
  reflow.engine.v1.WebhookSourceRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertWebhookSourceResponse {
  uint64 table_revision = 1;
}

message DeleteWebhookSourceRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteWebhookSourceResponse {
  uint64 table_revision = 1;
}

message ListWebhookSourcesRequest {}
message ListWebhookSourcesResponse {
  repeated reflow.engine.v1.WebhookSourceRecord sources = 1;
  uint64 table_revision = 2;
}

// UpsertSecretRequest carries one SecretRecord plus an optional CAS
// guard. if_table_revision_eq=0 disables CAS.
message UpsertSecretRequest {
  reflow.engine.v1.SecretRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertSecretResponse {
  uint64 table_revision = 1;
}

message DeleteSecretRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteSecretResponse {
  uint64 table_revision = 1;
}

message ListSecretsRequest {}
message ListSecretsResponse {
  repeated reflow.engine.v1.SecretRecord records = 1;
  uint64 table_revision = 2;
}

// UpsertCARootRequest carries one CARootRecord plus an optional CAS
// guard. if_table_revision_eq=0 disables CAS.
message UpsertCARootRequest {
  reflow.engine.v1.CARootRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertCARootResponse {
  uint64 table_revision = 1;
}

message DeleteCARootRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteCARootResponse {
  uint64 table_revision = 1;
}

message ListCARootsRequest {}
message ListCARootsResponse {
  repeated reflow.engine.v1.CARootRecord records = 1;
  uint64 table_revision = 2;
}

// LeaderHint is attached as a connect.Error detail on
// connect.CodeUnavailable returned by mutating Config RPCs when the
// receiving node is not the metadata leader. Clients extract it, dial
// admin_endpoint, retry. Same shape as clusterctlv1.LeaderHint;
// duplicated here so configv1 is self-contained.
message LeaderHint {
  uint64 node_id = 1;
  string admin_endpoint = 2;
}

// ListAuditLogRequest narrows the AuditLogTable scan. All filters are
// optional: zero-valued fields disable that filter dimension.
//   - since_ms / until_ms: ts_ms inclusive lower / exclusive upper bound.
//     0 means "no bound on that side".
//   - tenant_id: when non-zero, return only rows scoped to this tenant
//     (including audit rows for that tenant's own UpsertTenant /
//     UpsertTenantDEK / ... events). 0 returns every tenant including
//     the default-tenant sentinel and engine-self-proposed rows.
//   - action_kind: when non-empty, return only rows whose action_kind
//     exactly matches (e.g. "UpsertTenant").
//   - limit: cap the response size. 0 means "no caller-side cap" — the
//     server still applies a hard ceiling (configurable; see the
//     handler implementation) to keep one query from monopolizing
//     a SyncRead.
message ListAuditLogRequest {
  uint64 since_ms = 1;
  uint64 until_ms = 2;
  uint32 tenant_id = 3;
  string action_kind = 4;
  uint32 limit = 5;
}

message ListAuditLogResponse {
  repeated reflow.engine.v1.AuditLogRecord records = 1;
  // more is true when the server-side limit (caller's or the handler's
  // hard ceiling) cut the response short. Clients narrow the time
  // window or increase limit and re-issue.
  bool more = 2;
}
