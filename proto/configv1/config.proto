// Reflw Config service — the app-config surface.
//
// Config owns the *logical* config that shapes what runs on the
// cluster: handler deployments, named secrets, CA roots, join tokens,
// and the cluster authz policy. It is the developer-facing counterpart
// to reflw.clusterctl.v1.ClusterCtl (which owns cluster topology, DR,
// and routing). Naming mirrors Restate's split between
// `cluster-ctrl` (cluster admin) and `admin` (app config), with the
// terminology flipped to avoid the overloaded word "admin".
//
// Every reflwd process hosts a Config Connect RPC server on the
// admin listener (same port as ClusterCtl). The server is
// mTLS-protected; the Cedar foundational policy (internal/authz)
// gates /reflw.config.v1.Config/* to operator/* principals — same as
// ClusterCtl. The separation of services is the seam for later
// delegating Config to a narrower credential (admin, CI
// service account) without loosening cluster-control authority.
//
// All mutating RPCs propose Command_* commands to shard 0 with a
// table-revision CAS guard (if_table_revision_eq=0 disables CAS); the
// FSM signals a CAS mismatch via Result.Value =
// ResultValueFailedPrecondition, which the server surfaces as
// connect.CodeFailedPrecondition. Read RPCs route to a local shard-0
// replica via SyncRead.

syntax = "proto3";

package reflw.config.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflw/proto/configv1;configv1";

service Config {
  // RegisterDeployment introduces a new handler deployment to the
  // cluster. The engine dials <url>, issues a discovery GET to
  // enumerate handlers, validates the protocol version, mints a
  // UUIDv4 deployment_id, and proposes Command_RegisterDeployment to
  // shard 0. Returns the assigned id. URL must use http:// or
  // https://.
  rpc RegisterDeployment(RegisterDeploymentRequest) returns (RegisterDeploymentResponse);

  // ListDeployments returns every DeploymentRecord in shard 0 plus the
  // deployment table revision. Reads via SyncRead — any peer can
  // serve. Operators use the returned revision as if_table_revision_eq
  // on subsequent Delete calls.
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);

  // DescribeDeployment returns one DeploymentRecord by id, or
  // CodeNotFound. Reads via SyncRead.
  rpc DescribeDeployment(DescribeDeploymentRequest) returns (DescribeDeploymentResponse);

  // DeleteDeployment removes one DeploymentRecord from shard 0 and
  // evicts any (service, handler) → id index entries that pointed to
  // it. Leader-only. force must be true; without it the server returns
  // CodeFailedPrecondition because deleting a deployment is destructive
  // — in-flight invocations resolve their deployment record per
  // stream-open, and a delete breaks any open or replaying invocation
  // pinned to this id. force is the operator's "yes I accept the
  // risk" acknowledgement; reflw does not currently scan partitions
  // for active references.
  rpc DeleteDeployment(DeleteDeploymentRequest) returns (DeleteDeploymentResponse);

  // RegisterModelSet / ListModels / DescribeModel / DeleteModel manage shard 0's
  // ModelTable — BPMN/CMMN/DMN model definitions (model_ref + inlined XML).
  // RegisterModelSet atomically registers a model plus its transitively-
  // referenced dependencies: the server parses every entry, auto-derives each
  // model's bundle (DMN imports, BusinessRuleTask decisions, child processes/
  // cases), validates the set ∪ existing-table is dependency-closed and
  // cycle-free, and proposes one Command_UpsertModelSet under a single CAS. A
  // one-entry set is a single-model register. The per-node processengine
  // TableResolver reconciles rows into parsed graphs + decision/import resolvers
  // + resolved historyTimeToLive. Leader-only for mutating calls; List/Describe
  // are SyncRead. DeleteModel takes if_table_revision_eq for CAS (no force gate —
  // an in-flight instance pins its model_ref and fails on its next turn).
  rpc RegisterModelSet(RegisterModelSetRequest) returns (RegisterModelSetResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc DescribeModel(DescribeModelRequest) returns (DescribeModelResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);

  // UpsertSecret / DeleteSecret / ListSecrets mirror the same trio
  // against shard 0's SecretTable. Each SecretRecord references a
  // ciphertext blob (gocloud.dev/blob URI) and a KEK (Tink KMS URI);
  // the plaintext never traverses Raft. Per-node
  // internal/secretstore Reconcilers fetch + decrypt at reconcile
  // time and surface bytes via in-memory Lookup. Leader-only for
  // mutating calls; List is SyncRead.
  rpc UpsertSecret(UpsertSecretRequest) returns (UpsertSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // Cluster CA roots, join tokens, and operator-cert issuance were
  // removed: the cluster CA is now config + KMS (public cert in config,
  // KMS-wrapped key at a config blob URI), each node self-issues its
  // mesh leaf, and `reflwd config {ca init,issue-operator}` are local
  // CLI commands. No shard-0 CA/join-token RPCs remain.

  // UpsertClusterAuthzPolicy replaces shard 0's cluster-wide Cedar authz
  // policy text (PlatformConfigRecord). The server runs layer-1 schema
  // validation before proposing, so an invalid policy is rejected at upload,
  // never installed. CAS via if_table_revision_eq. Operator-only. Leader-only.
  rpc UpsertClusterAuthzPolicy(UpsertClusterAuthzPolicyRequest) returns (UpsertClusterAuthzPolicyResponse);
  // GetClusterAuthzPolicy returns the current cluster authz policy text + the
  // platform-config table revision (for a CAS round-trip). Operator-only.
  rpc GetClusterAuthzPolicy(GetClusterAuthzPolicyRequest) returns (GetClusterAuthzPolicyResponse);
}

// RegisterDeploymentRequest names a handler endpoint reachable over
// HTTP/2. URL scheme must be http:// or https://; the engine dials
// the handler via Connect RPC.
message RegisterDeploymentRequest {
  string url = 1;
  // Optional per-invocation cap on journal entries for this
  // deployment. 0 = engine default (10_000). The engine clamps to a
  // hard ceiling (100_000).
  uint32 max_journal_entries = 2;
  // Optional per-deployment retention windows (ms) before a Completed
  // invocation's durable rows are reaped. 0 = engine default (24h
  // invocations / 7d workflows). The engine clamps to a hard ceiling
  // (365d).
  uint64 invocation_retention_ms = 3;
  uint64 workflow_retention_ms = 4;
}

message RegisterDeploymentResponse {
  string deployment_id = 1;
}

message ListDeploymentsRequest {}
message ListDeploymentsResponse {
  repeated reflw.engine.v1.DeploymentRecord deployments = 1;
  uint64 table_revision = 2;
}

message DescribeDeploymentRequest {
  string deployment_id = 1;
}
message DescribeDeploymentResponse {
  reflw.engine.v1.DeploymentRecord deployment = 1;
}

// DeleteDeploymentRequest names one deployment by id. force must be
// true to confirm the operator accepts that in-flight invocations
// referencing this deployment may break. if_table_revision_eq=0
// disables CAS; non-zero requires the deployment table revision to
// match (CodeFailedPrecondition on mismatch).
message DeleteDeploymentRequest {
  string deployment_id = 1;
  bool force = 2;
  uint64 if_table_revision_eq = 3;
}
message DeleteDeploymentResponse {
  uint64 table_revision = 1;
}

// Model registration (shard 0 ModelTable). Each ModelSetEntry pins
// kind+name+version + the BPMN/CMMN/DMN XML source. The server derives the
// bundle (decisions/children/imports) for every entry — clients never author
// bundles. A RegisterModelSetRequest is the model + its dependency closure;
// the server validates the closure (set ∪ existing table) before proposing.
message ModelSetEntry {
  reflw.engine.v1.ModelRef model_ref = 1;
  bytes xml = 2;
}
message RegisterModelSetRequest {
  repeated ModelSetEntry entries = 1;
  // if_table_revision_eq guards the whole set against a concurrent ModelTable
  // change between the server's closure read and the apply (0 disables CAS).
  uint64 if_table_revision_eq = 2;
}
message RegisterModelSetResponse {
  uint64 table_revision = 1;
}
message ListModelsRequest {}
message ListModelsResponse {
  repeated reflw.engine.v1.ModelRecord records = 1;
  uint64 table_revision = 2;
}
message DescribeModelRequest {
  reflw.engine.v1.ModelRef model_ref = 1;
}
message DescribeModelResponse {
  reflw.engine.v1.ModelRecord record = 1;
}
message DeleteModelRequest {
  reflw.engine.v1.ModelRef model_ref = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteModelResponse {
  uint64 table_revision = 1;
}

// Cluster authz policy (PlatformConfigRecord.cluster_authz_policy_text).
message UpsertClusterAuthzPolicyRequest {
  string policy_text = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertClusterAuthzPolicyResponse {
  uint64 table_revision = 1;
}
message GetClusterAuthzPolicyRequest {}
message GetClusterAuthzPolicyResponse {
  string policy_text = 1;
  uint64 table_revision = 2;
}


// UpsertSecretRequest carries one SecretRecord plus an optional CAS
// guard. if_table_revision_eq=0 disables CAS.
message UpsertSecretRequest {
  reflw.engine.v1.SecretRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertSecretResponse {
  uint64 table_revision = 1;
}

message DeleteSecretRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteSecretResponse {
  uint64 table_revision = 1;
}

message ListSecretsRequest {}
message ListSecretsResponse {
  repeated reflw.engine.v1.SecretRecord records = 1;
  uint64 table_revision = 2;
}

// LeaderHint is attached as a connect.Error detail on
// connect.CodeUnavailable returned by mutating Config RPCs when the
// receiving node is not the metadata leader. Clients extract it, dial
// admin_endpoint, retry. Same shape as clusterctlv1.LeaderHint;
// duplicated here so configv1 is self-contained.
message LeaderHint {
  uint64 node_id = 1;
  string admin_endpoint = 2;
}
