// Reflow Config service — the app-config surface.
//
// Config owns the *logical* config that shapes what runs on the
// cluster: handler deployments, event-source bindings, inbound
// webhook bindings, and the named-secret table consumers reference.
// It is the developer-facing counterpart to
// reflow.clusterctl.v1.ClusterCtl (which owns cluster topology, DR,
// and routing). Naming mirrors Restate's split between
// `cluster-ctrl` (cluster admin) and `admin` (app config), with the
// terminology flipped to avoid the overloaded word "admin".
//
// Every reflowd process hosts a Config Connect RPC server on the
// admin listener (same port as ClusterCtl in step 1; a follow-on may
// move Config onto its own port if/when we want different network
// exposure). The server is mTLS-protected; today's starter policy
// gates /reflow.config.v1.Config/* to operator/* principals — same as
// ClusterCtl. The separation of services is the seam for later
// delegating Config to a narrower credential (tenant admin, CI
// service account) without loosening cluster-control authority.
//
// All mutating RPCs propose Command_* commands to shard 0 with a
// table-revision CAS guard (if_table_revision_eq=0 disables CAS); the
// FSM signals a CAS mismatch via Result.Value =
// ResultValueFailedPrecondition, which the server surfaces as
// connect.CodeFailedPrecondition. Read RPCs route to a local shard-0
// replica via SyncRead.

syntax = "proto3";

package reflow.config.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflow/proto/configv1;configv1";

service Config {
  // RegisterDeployment introduces a new handler deployment to the
  // cluster. The engine dials <url>, issues a discovery GET to
  // enumerate handlers, validates the protocol version, mints a
  // UUIDv4 deployment_id, and proposes Command_RegisterDeployment to
  // shard 0. Returns the assigned id. URL must use http:// or
  // https://.
  rpc RegisterDeployment(RegisterDeploymentRequest) returns (RegisterDeploymentResponse);

  // ListDeployments returns every DeploymentRecord in shard 0 plus the
  // deployment table revision. Reads via SyncRead — any peer can
  // serve. Operators use the returned revision as if_table_revision_eq
  // on subsequent Delete calls.
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);

  // DescribeDeployment returns one DeploymentRecord by id, or
  // CodeNotFound. Reads via SyncRead.
  rpc DescribeDeployment(DescribeDeploymentRequest) returns (DescribeDeploymentResponse);

  // DeleteDeployment removes one DeploymentRecord from shard 0 and
  // evicts any (service, handler) → id index entries that pointed to
  // it. Leader-only. force must be true; without it the server returns
  // CodeFailedPrecondition because deleting a deployment is destructive
  // — in-flight invocations resolve their deployment record per
  // stream-open, and a delete breaks any open or replaying invocation
  // pinned to this id. force is the operator's "yes I accept the
  // risk" acknowledgement; reflow does not currently scan partitions
  // for active references.
  rpc DeleteDeployment(DeleteDeploymentRequest) returns (DeleteDeploymentResponse);

  // UpsertModel / ListModels / DescribeModel / DeleteModel manage shard 0's
  // ModelTable — BPMN/CMMN model definitions (model_ref + inlined XML). Upsert
  // parses-to-validate before proposing Command_UpsertModel; the per-node
  // iflowengine TableResolver reconciles rows into parsed graphs + resolved
  // historyTimeToLive. Leader-only for mutating calls; List/Describe are
  // SyncRead. DeleteModel takes if_table_revision_eq for CAS (no force gate —
  // an in-flight instance pins its model_ref and fails on its next turn).
  rpc UpsertModel(UpsertModelRequest) returns (UpsertModelResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc DescribeModel(DescribeModelRequest) returns (DescribeModelResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);

  // UpsertSecret / DeleteSecret / ListSecrets mirror the same trio
  // against shard 0's SecretTable. Each SecretRecord references a
  // ciphertext blob (gocloud.dev/blob URI) and a KEK (Tink KMS URI);
  // the plaintext never traverses Raft. Per-node
  // internal/secretstore Reconcilers fetch + decrypt at reconcile
  // time and surface bytes via in-memory Lookup. Leader-only for
  // mutating calls; List is SyncRead.
  rpc UpsertSecret(UpsertSecretRequest) returns (UpsertSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // UpsertCARoot / DeleteCARoot / ListCARoots mirror the secret trio
  // against shard 0's CARootTable. Each CARootRecord carries a CA
  // cert (PEM) plus a pointer to the SecretTable row holding the
  // AEAD-wrapped signing key. The signing key never traverses Raft.
  // Per-node certmgr.ClusterIssuer fetches + decrypts via
  // secretstore.LookupForCASigning at reconcile time. Leader-only for
  // mutating calls; List is SyncRead.
  rpc UpsertCARoot(UpsertCARootRequest) returns (UpsertCARootResponse);
  rpc DeleteCARoot(DeleteCARootRequest) returns (DeleteCARootResponse);
  rpc ListCARoots(ListCARootsRequest) returns (ListCARootsResponse);

  // CreateJoinToken mints a one-time kubeadm-style joiner credential.
  // The server generates a random plaintext, persists only its sha256
  // hash + a JoinTokenRecord into shard 0's JoinTokenTable, and
  // returns the plaintext to the operator exactly once. Subsequent
  // List calls show only the hash. Operators redeem the plaintext via
  // `reflowd run --join`. Leader-only.
  rpc CreateJoinToken(CreateJoinTokenRequest) returns (CreateJoinTokenResponse);
  // DeleteJoinToken removes a row by hex(token_hash) — surfaces in
  // ListJoinTokens. Idempotent.
  rpc DeleteJoinToken(DeleteJoinTokenRequest) returns (DeleteJoinTokenResponse);
  // ListJoinTokens returns every JoinTokenRecord. SyncRead.
  rpc ListJoinTokens(ListJoinTokensRequest) returns (ListJoinTokensResponse);

  // IssueOperator mints an operator client cert against the active
  // cluster CA. The operator generates the keypair locally, sends the
  // CSR, and receives the signed leaf + CA chain. Authorization is via
  // the existing operator/* policy gate; the in-server signer is the
  // same ClusterIssuer the bootstrap listener uses. Leader-only.
  // Replaces the deleted `reflowd pki issue-operator` flow.
  rpc IssueOperator(IssueOperatorRequest) returns (IssueOperatorResponse);

  // IssueTenant mints a tenant client cert (CN "tenant/<n>", n in [1,255])
  // against the active cluster CA — the source identity for LP-band tenancy.
  // Same flow as IssueOperator (operator generates the keypair, sends the
  // CSR, receives the signed leaf + CA chain); the server validates the CN's
  // numeric tenant band and signs the public key. Operator-only, leader-only.
  rpc IssueTenant(IssueTenantRequest) returns (IssueTenantResponse);

  // UpsertClusterAuthzPolicy replaces shard 0's cluster-wide Cedar authz
  // policy text (PlatformConfigRecord). The server runs layer-1 schema
  // validation before proposing, so an invalid policy is rejected at upload,
  // never installed. CAS via if_table_revision_eq. Operator-only. Leader-only.
  rpc UpsertClusterAuthzPolicy(UpsertClusterAuthzPolicyRequest) returns (UpsertClusterAuthzPolicyResponse);
  // GetClusterAuthzPolicy returns the current cluster authz policy text + the
  // platform-config table revision (for a CAS round-trip). Operator-only.
  rpc GetClusterAuthzPolicy(GetClusterAuthzPolicyRequest) returns (GetClusterAuthzPolicyResponse);
}

// RegisterDeploymentRequest names a handler endpoint reachable over
// HTTP/2. URL scheme must be http:// or https://; the engine dials
// the handler via Connect RPC.
message RegisterDeploymentRequest {
  string url = 1;
  // Optional per-invocation cap on journal entries for this
  // deployment. 0 = engine default (10_000). The engine clamps to a
  // hard ceiling (100_000).
  uint32 max_journal_entries = 2;
  // Optional per-deployment retention windows (ms) before a Completed
  // invocation's durable rows are reaped. 0 = engine default (24h
  // invocations / 7d workflows). The engine clamps to a hard ceiling
  // (365d).
  uint64 invocation_retention_ms = 3;
  uint64 workflow_retention_ms = 4;
}

message RegisterDeploymentResponse {
  string deployment_id = 1;
}

message ListDeploymentsRequest {}
message ListDeploymentsResponse {
  repeated reflow.engine.v1.DeploymentRecord deployments = 1;
  uint64 table_revision = 2;
}

message DescribeDeploymentRequest {
  string deployment_id = 1;
}
message DescribeDeploymentResponse {
  reflow.engine.v1.DeploymentRecord deployment = 1;
}

// DeleteDeploymentRequest names one deployment by id. force must be
// true to confirm the operator accepts that in-flight invocations
// referencing this deployment may break. if_table_revision_eq=0
// disables CAS; non-zero requires the deployment table revision to
// match (CodeFailedPrecondition on mismatch).
message DeleteDeploymentRequest {
  string deployment_id = 1;
  bool force = 2;
  uint64 if_table_revision_eq = 3;
}
message DeleteDeploymentResponse {
  uint64 table_revision = 1;
}

// Model registration (shard 0 ModelTable). model_ref pins kind+name+version;
// xml is the BPMN/CMMN source the server parses-to-validate before proposing.
message UpsertModelRequest {
  reflow.engine.v1.ModelRef model_ref = 1;
  bytes xml = 2;
  uint64 if_table_revision_eq = 3;
  // bundle is the optional decision/child ref-resolution map stored on the
  // ModelRecord (decisions → kind=dmn refs, children → kind=bpmn/cmmn refs).
  reflow.engine.v1.ModelBundle bundle = 4;
}
message UpsertModelResponse {
  uint64 table_revision = 1;
}
message ListModelsRequest {}
message ListModelsResponse {
  repeated reflow.engine.v1.ModelRecord records = 1;
  uint64 table_revision = 2;
}
message DescribeModelRequest {
  reflow.engine.v1.ModelRef model_ref = 1;
}
message DescribeModelResponse {
  reflow.engine.v1.ModelRecord record = 1;
}
message DeleteModelRequest {
  reflow.engine.v1.ModelRef model_ref = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteModelResponse {
  uint64 table_revision = 1;
}

// Cluster authz policy (PlatformConfigRecord.cluster_authz_policy_text).
message UpsertClusterAuthzPolicyRequest {
  string policy_text = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertClusterAuthzPolicyResponse {
  uint64 table_revision = 1;
}
message GetClusterAuthzPolicyRequest {}
message GetClusterAuthzPolicyResponse {
  string policy_text = 1;
  uint64 table_revision = 2;
}


// UpsertSecretRequest carries one SecretRecord plus an optional CAS
// guard. if_table_revision_eq=0 disables CAS.
message UpsertSecretRequest {
  reflow.engine.v1.SecretRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertSecretResponse {
  uint64 table_revision = 1;
}

message DeleteSecretRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteSecretResponse {
  uint64 table_revision = 1;
}

message ListSecretsRequest {}
message ListSecretsResponse {
  repeated reflow.engine.v1.SecretRecord records = 1;
  uint64 table_revision = 2;
}

// UpsertCARootRequest carries one CARootRecord plus an optional CAS
// guard. if_table_revision_eq=0 disables CAS.
message UpsertCARootRequest {
  reflow.engine.v1.CARootRecord record = 1;
  uint64 if_table_revision_eq = 2;
}
message UpsertCARootResponse {
  uint64 table_revision = 1;
}

message DeleteCARootRequest {
  string name = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteCARootResponse {
  uint64 table_revision = 1;
}

message ListCARootsRequest {}
message ListCARootsResponse {
  repeated reflow.engine.v1.CARootRecord records = 1;
  uint64 table_revision = 2;
}

// LeaderHint is attached as a connect.Error detail on
// connect.CodeUnavailable returned by mutating Config RPCs when the
// receiving node is not the metadata leader. Clients extract it, dial
// admin_endpoint, retry. Same shape as clusterctlv1.LeaderHint;
// duplicated here so configv1 is self-contained.
message LeaderHint {
  uint64 node_id = 1;
  string admin_endpoint = 2;
}


// CreateJoinTokenRequest configures a one-time bootstrap credential.
//   - kind: NODE for a `reflowd run --join` flow, OPERATOR for
//     `reflowd config issue-operator` (the operator generates the
//     keypair locally and submits a CSR — same RPC, different path
//     into the cluster).
//   - requested_name: the CN-name segment the joiner will use. For
//     node tokens, "auto" lets the bootstrap server allocate the
//     next free node_id at redemption time. For operator tokens, the
//     name is mandatory (operator-chosen, never "auto").
//   - ttl_seconds: how long the token remains redeemable. The
//     bootstrap server rejects with PermissionDenied once exceeded.
//     Zero means no TTL (single_use is still enforced — once spent,
//     the row stays in the table but cannot be redeemed again).
//   - single_use: true (the default) marks the row as spent on the
//     first successful MeshSign redemption. false produces a token
//     that can be redeemed repeatedly until expiry — used sparingly
//     for ephemeral CI scenarios.
message CreateJoinTokenRequest {
  reflow.engine.v1.JoinTokenKind kind = 1;
  string requested_name = 2;
  uint64 ttl_seconds = 3;
  bool single_use = 4;
}

message CreateJoinTokenResponse {
  // token is the plaintext credential the operator forwards to the
  // joiner. Shown exactly once; the server persists only sha256(token).
  string token = 1;
  bytes token_hash = 2;
  uint64 table_revision = 3;
}

message DeleteJoinTokenRequest {
  // token_hash is the sha256(token) returned by ListJoinTokens.
  bytes token_hash = 1;
  uint64 if_table_revision_eq = 2;
}
message DeleteJoinTokenResponse {
  uint64 table_revision = 1;
}

message ListJoinTokensRequest {}
message ListJoinTokensResponse {
  repeated reflow.engine.v1.JoinTokenRecord records = 1;
  uint64 table_revision = 2;
}

// IssueOperatorRequest carries an operator-generated CSR. Replaces the
// deleted `reflowd pki issue-operator` flow. The operator keypair never
// leaves the operator's machine; the server signs only the public key.
message IssueOperatorRequest {
  // DER-encoded x509.CertificateRequest. Subject.CommonName must be
  // "operator/<name>". validity is honored up to the server's
  // configured ceiling (default 30 days; longer requests are clamped
  // silently).
  bytes csr_der = 1;
  uint64 validity_seconds = 2;
}

message IssueOperatorResponse {
  bytes cert_pem = 1;
  bytes ca_chain_pem = 2;
  string ca_fingerprint = 3;
}

// IssueTenantRequest carries an operator-generated CSR for a tenant leaf.
// The keypair never leaves the operator's machine; the server signs only
// the public key after validating the CN.
message IssueTenantRequest {
  // DER-encoded x509.CertificateRequest. Subject.CommonName must be
  // "tenant/<n>" with n a decimal integer in [1,255] (band 0 is reserved
  // for untenanted traffic). validity is clamped to the server ceiling.
  bytes csr_der = 1;
  uint64 validity_seconds = 2;
}

message IssueTenantResponse {
  bytes cert_pem = 1;
  bytes ca_chain_pem = 2;
  string ca_fingerprint = 3;
}
