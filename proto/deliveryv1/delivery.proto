// Reflow inter-node Delivery service.
//
// Every reflwd process hosts a Delivery gRPC server. When a shard's
// leader-side OutboxService sees an OutboxEnvelope whose
// destination_shard_id does not match the local shard, it dials the
// destination shard's current leader via this service and streams the
// envelope as a Command. The receiver's Delivery server calls the local
// RaftProposer.ProposeIngress on the destination shard if and only if
// this node holds that shard's leadership.
//
// A successful Ack means "I have durably accepted responsibility for
// proposing this command via Raft" — durable apply on the receiver
// triggers a reciprocal OutboxAck envelope that pops the sender's
// outbox row. NotLeader carries the receiver's leader hint so the
// sender can re-resolve via the dragonboat gossip ShardView and retry.
//
// Authorization: every RPC on this service requires a "node" principal.
// The starter grpc-go authz policy in internal/auth/starter_policy.json
// restricts /reflw.delivery.v1.Delivery/* to principals matching
// "node/*"; operators may override via Config.Auth.PolicyFile.
syntax = "proto3";

package reflw.delivery.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflw/proto/deliveryv1;deliveryv1";

service Delivery {
  // Deliver is a bidirectional stream so the sender can pipeline multiple
  // envelopes and observe acks / not-leader signals without head-of-line
  // blocking. Implementations issue exactly one DeliverResponse per
  // DeliverRequest, correlated by the echoed seq.
  rpc Deliver(stream DeliverRequest) returns (stream DeliverResponse);

  // UploadLPTransferSST streams one SST file from a source partition's
  // LPTransferSourceService to a destination partition. The first frame
  // MUST be a header (dest_shard, transfer_id, namespace, expected size
  // + checksum); subsequent frames are body chunks. The server writes
  // the bytes to `<DataDir>/p<dest_shard>/state.lpstage_in/<transfer_id>/
  // <namespace>.sst.tmp`, fsyncs, and atomically renames to
  // `<namespace>.sst` on EOF. The single response carries the relative
  // path the source must echo back in the subsequent
  // Command_ApplyLpTransferSst Raft propose, or NotLeader/Err.
  //
  // Re-upload of the same (transfer_id, namespace) is idempotent: the
  // .tmp file is overwritten on each attempt; rename is atomic.
  rpc UploadLPTransferSST(stream UploadLPTransferSSTRequest)
      returns (UploadLPTransferSSTResponse);
}

// DeliverRequest carries an outbox envelope that the sender wants
// proposed on shard_id. producer_id and seq must match the values
// stamped on the envelope's ArbitraryDedup header so the receiver's
// dedup absorbs replayed sends on crash recovery.
message DeliverRequest {
  uint64 shard_id = 1;
  string producer_id = 2;
  uint64 seq = 3;
  reflw.engine.v1.Command command = 4;
}

// DeliverResponse is the single reply for a DeliverRequest. The seq
// field is echoed from the request for correlation on the bidi stream.
message DeliverResponse {
  uint64 seq = 1;
  oneof kind {
    Ack ack = 2;
    NotLeader not_leader = 3;
    Err err = 4;
  }
}

// Ack confirms the destination shard's leader on this node has called
// SyncPropose and the command is durably accepted.
message Ack {}

// NotLeader indicates this node is not the leader of the requested
// shard. leader_node_id is a hint from the local ShardView; sender
// should re-resolve via gossip and retry.
message NotLeader {
  uint64 leader_node_id = 1;
}

// Err is a transient error (e.g. shard not started, dragonboat
// timeout). Sender should back off and retry.
message Err {
  string message = 1;
}

// UploadLPTransferSSTRequest is one frame of the SST upload stream.
// First frame MUST be a header; subsequent frames MUST be chunks.
message UploadLPTransferSSTRequest {
  oneof kind {
    UploadLPTransferSSTHeader header = 1;
    bytes chunk = 2;
  }
}

// UploadLPTransferSSTHeader is the first stream frame. The server uses
// dest_shard to confirm leadership locally and rejects with NotLeader
// when this node does not host the dest shard's leader. namespace is a
// short tag (e.g. "inv", "journal", "timer_primary") that determines
// the on-disk filename `<namespace>.sst` under
// `<dataDir>.lpstage_in/<transfer_id>/`. size_bytes and sha256_hex
// belt the body against truncation / mid-stream corruption.
message UploadLPTransferSSTHeader {
  uint64 dest_shard = 1;
  string transfer_id = 2;
  string namespace = 3;
  uint64 size_bytes = 4;
  string sha256_hex = 5;
}

// UploadLPTransferSSTResponse is the single reply for one upload.
message UploadLPTransferSSTResponse {
  oneof kind {
    UploadLPTransferSSTAck ack = 1;
    NotLeader not_leader = 2;
    Err err = 3;
  }
}

// UploadLPTransferSSTAck confirms the file was written, fsynced, and
// renamed into place. relative_path is rooted at the dest's
// `<dataDir>.lpstage_in/<transfer_id>/` directory and is what the
// source must echo back in TransferSSTRef.relative_path.
message UploadLPTransferSSTAck {
  string relative_path = 1;
}
