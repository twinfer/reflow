// Reflow engine wire types.
//
// Mirrors Restate's wal-protocol v2 and journal v2 where applicable; citations
// to crates/... refer to Restate v1.6.2.
//
// Scope per phase:
//   Phase 1: partition-shard commands + rows. AnnounceLeader is shared with
//     the metadata shard, but Phase 1 deployments only host partition shards.
//   Phase 2 (current): in-process Go SDK + Invoker. Adds JournalEntry
//     variants (JERun, JEAwakeable, JEAwakeableResult, JESignal,
//     JEClearState, JEGetEagerState) and InvokerEffect kinds (JERunProposal,
//     AwakeableResolved, SignalDelivered). PartitionMeta gains
//     next_outbox_seq; AwakeableEntry is the awakeable directory value.
//   Phase 4: metadata-shard commands (RegisterNode, RemoveNode,
//     UpdatePartitionTable, Heartbeat, VersionBarrier) will land in the
//     Command oneof's reserved tag range (6-15). See SAD §6.2.
//   Phase 4+: SnapshotMeta (defined below) is the operator-visible sidecar
//     written by the SnapshotRepository. See SAD §6.12.
//
// All commands flow through the same dragonboat IOnDiskStateMachine
// (Partition). The only thing distinguishing a metadata shard (shardID=0)
// from a partition shard (shardID=1..N) at the wire level is which Command
// variants the shard accepts.
syntax = "proto3";

package reflow.engine.v1;

option go_package = "github.com/twinfer/reflow/proto/enginev1;enginev1";

// InvocationId carries the partition_key inside the ID so routing never needs
// to re-parse the target. Mirrors restate types/identifiers.rs:456-461.
message InvocationId {
  fixed64 partition_key = 1;
  bytes uuid = 2; // 16 bytes
}

message InvocationTarget {
  string service_name = 1;
  string handler_name = 2;
  string object_key = 3; // empty for unkeyed services
}

// Deduplication strategy.
// Phase 1 only emits SelfProposal (leader) and Arbitrary (ingress).
message Dedup {
  oneof kind {
    SelfProposalDedup self_proposal = 1;
    ArbitraryDedup arbitrary = 2;
  }
}

message SelfProposalDedup {
  uint64 leader_epoch = 1;
  uint64 seq = 2;
}

message ArbitraryDedup {
  string producer_id = 1;
  uint64 seq = 2;
}

// Envelope wraps every Raft command.
message Envelope {
  Header header = 1;
  Command command = 2;
}

message Header {
  Dedup dedup = 1;
  fixed64 created_at_ms = 2;
}

// Command oneof. Mirrors restate CommandKind in
// crates/wal-protocol/src/v2.rs:222-283.
//
// Tag assignment:
//   1     : AnnounceLeader        (every shard)
//   2-5   : partition-shard commands (Phase 1)
//   6-15  : reserved for Phase 4 metadata-shard commands (RegisterNode,
//           RemoveNode, UpdatePartitionTable, Heartbeat, VersionBarrier).
//           Do not allocate from this range without updating SAD §6.2.
//   16+   : reserved for Phase 2-3 partition-shard additions (Run effects,
//           awakeable completions, virtual-object queue ops).
message Command {
  reserved 6 to 15;

  oneof kind {
    AnnounceLeader announce_leader = 1;
    InvokeCommand invoke = 2;
    InvokerEffect invoker_effect = 3;
    TimerFired timer_fired = 4;
    PurgeInvocation purge = 5;
  }
}

// AnnounceLeader is proposed on every shard when its leader changes. It is
// the only Command variant accepted by both the metadata shard (shardID=0)
// and partition shards (shardID=1..N).
//
// partition_key_start and partition_key_end describe the partition-key range
// this shard owns; meaningful for partition shards only. The metadata shard
// sets both to 0.
message AnnounceLeader {
  uint64 node_id = 1;
  uint64 leader_epoch = 2;
  fixed64 partition_key_start = 3;
  fixed64 partition_key_end = 4;
}

message InvokeCommand {
  InvocationId invocation_id = 1;
  InvocationTarget target = 2;
  bytes input = 3;
  string idempotency_key = 4;
  // ParentLink is set when this invocation is the callee of a ctx.Call from
  // another invocation. The receiving partition's FSM propagates it onto the
  // callee's status so the callee's Completed apply arm can journal a
  // JECallResult back on the parent. Phase 2.5.
  ParentLink parent_link = 5;
}

// ParentLink references the parent invocation that spawned a callee via
// ctx.Call. parent_id is the parent's InvocationId; call_index is the
// journal index of the parent's JECall entry. The callee's JECallResult
// lands at call_index + 1. Phase 2.5.
message ParentLink {
  InvocationId parent_id = 1;
  uint32 call_index = 2;
}

message InvokerEffect {
  InvocationId invocation_id = 1;
  oneof kind {
    JournalEntryAppended journal_appended = 2;
    InvocationCompleted completed = 3;
    InvocationSuspended suspended = 4;
    // Phase 2 additions.
    JERunProposal run_proposal = 5;
    AwakeableResolved awakeable_resolved = 6;
    SignalDelivered signal_delivered = 7;
  }
}

// JERunProposal carries the outcome of a deterministic side-effect block
// (ctx.Run) from the SDK back to the engine. The FSM applies it by writing
// a JERun journal entry at entry_index and acking the SDK. Phase 2.
//
// Phase 3 additions:
//   retryable    — set when the SDK classified fn's error as non-terminal
//                  (anything other than *sdk.Failure). When true the engine
//                  may compute a backoff via internal/engine/retry.go and
//                  reschedule the body. Defaults to false → terminal.
//   attempt      — zero-based retry count this proposal carries: 0 on the
//                  first failure, N on the (N+1)th attempt. Echoes from the
//                  prior JERun.attempt + 1 on re-runs.
//   retry_policy — caller-supplied policy (echoed from StartInvocation
//                  on each proposal so the apply arm needs no per-invocation
//                  status fields). Zero values fall back to defaults
//                  defined in internal/engine/retry.go.
message JERunProposal {
  uint32 entry_index = 1;
  bytes value = 2;
  string failure_message = 3;
  bool retryable = 4;
  uint32 attempt = 5;
  RunRetryPolicy retry_policy = 6;
}

// AwakeableResolved is proposed by the partition that owns the resolving
// invocation when an external caller resolves an awakeable. The FSM appends
// a JEAwakeableResult to the owner's journal and wakes the suspended
// invocation if needed. Phase 2.
message AwakeableResolved {
  string awakeable_id = 1;
  bytes value = 2;
  string failure_message = 3;
}

// SignalDelivered is the receiver-side effect when a JESignal lands on its
// target invocation. signal_name + payload are the routed bits; the target
// InvocationId lives on the surrounding InvokerEffect.invocation_id. Phase 2.
message SignalDelivered {
  string signal_name = 1;
  bytes payload = 2;
}

message JournalEntryAppended {
  uint32 command_index = 1;
  JournalEntry entry = 2;
}

message InvocationCompleted {
  bytes output = 1;
  string failure_message = 2;
}

message InvocationSuspended {
  repeated string awaiting_on = 1;
}

// JournalEntry. Mirrors restate journal_v2 Command+Notification flat union
// at types/src/journal_v2/mod.rs:60-150.
//
// Tag assignment:
//   2-9   : Phase 1 baseline (Input, Sleep+Result, Call+Result, Get/SetState,
//           Output).
//   10-15 : Phase 2 (Run, Awakeable, AwakeableResult, Signal, ClearState,
//           GetEagerState).
//   16+   : reserved for Phase 3 (Promise combinators, AttachInvocation,
//           ClearAllState, idempotency-keyed Call, virtual-object queue ops).
message JournalEntry {
  uint32 index = 1;
  oneof entry {
    JEInput input = 2;
    JESleep sleep = 3;
    JESleepResult sleep_result = 4;
    JECall call = 5;
    JECallResult call_result = 6;
    JEGetState get_state = 7;
    JESetState set_state = 8;
    JEOutput output = 9;
    // Phase 2 additions.
    JERun run = 10;
    JEAwakeable awakeable = 11;
    JEAwakeableResult awakeable_result = 12;
    JESignal signal = 13;
    JEClearState clear_state = 14;
    JEGetEagerState get_eager_state = 15;
    // Phase 3 additions.
    JEClearAllState clear_all_state = 16;
  }
}

message JEInput {
  bytes value = 1;
}

message JESleep {
  uint64 fire_at_ms = 1;
}

message JESleepResult {
  uint32 sleep_index = 1;
}

message JECall {
  InvocationTarget target = 1;
  bytes input = 2;
  // Optional idempotency key — when set, the apply arm stamps it onto the
  // outgoing OutboxEnvelope.Invoke.InvokeCommand.idempotency_key so the
  // callee's receiving onInvoke runs Phase 3 idempotency dedup against the
  // (service, handler, object_key, idempotency_key) tuple. Phase 3.
  string idempotency_key = 3;
}

message JECallResult {
  uint32 call_index = 1;
  bytes result = 2;
  // failure_message is populated when the callee terminated with a failure
  // instead of a result. Mirrors the JEAwakeableResult / JERun shape. Phase 2.5.
  string failure_message = 3;
}

message JEGetState {
  string key = 1;
  bytes value = 2;
  bool present = 3;
}

message JESetState {
  string key = 1;
  bytes value = 2;
}

message JEOutput {
  bytes value = 1;
}

// JERun records the outcome of a deterministic side-effect block. The SDK
// runs the body once, journals (value or failure_message), and replays
// store-only on subsequent retries. attempt is bookkeeping for retry
// policies. retryable distinguishes a terminal error (handler fails) from a
// transient one (engine schedules a backoff and re-invokes fn). Phase 3.
message JERun {
  bytes value = 1;
  string failure_message = 2;
  uint32 attempt = 3;
  bool retryable = 4;
}

// RunRetryPolicy controls exponential backoff for retryable JERun failures.
// Carried on StartInvocation so the SDK can echo it through to the engine
// apply arm without per-Run wire traffic. Zero/absent fields fall back to
// defaults: initial=50ms, factor=2.0, max_interval=10s, max_attempts=0
// (unlimited). Phase 3.
message RunRetryPolicy {
  uint64 initial_interval_ms = 1;
  double factor = 2;
  uint64 max_interval_ms = 3;
  uint32 max_attempts = 4;
}

// JEClearAllState wipes every state row scoped to the invocation's
// (service, object_key). Empty body: the target is implied by the
// surrounding invocation. Apply arm uses StateTable.RangeDelete. Phase 3.
message JEClearAllState {}

// JEAwakeable is journaled when a handler mints an awakeable. The actual
// resolution arrives later as JEAwakeableResult after an external caller
// hits the ingress resolution endpoint. Phase 2.
message JEAwakeable {
  string awakeable_id = 1;
}

// JEAwakeableResult resolves a previously-minted awakeable. Written by
// the FSM in response to InvokerEffect.AwakeableResolved. Phase 2.
message JEAwakeableResult {
  string awakeable_id = 1;
  bytes value = 2;
  string failure_message = 3;
}

// JESignal is sender-side: the journal entry an invocation writes when it
// sends a signal to another invocation. The receiver-side effect is
// InvokerEffect.SignalDelivered. Phase 2.
message JESignal {
  InvocationId target_invocation_id = 1;
  string signal_name = 2;
  bytes payload = 3;
}

// JEClearState records a state deletion. Phase 2.
message JEClearState {
  string key = 1;
}

// JEGetEagerState is the eager-preload form of GetState: the value is
// resolved from the state map at StartInvocation time rather than via a
// follow-up notification. Defined for Phase 3; never emitted in Phase 2.
message JEGetEagerState {
  string key = 1;
  bytes value = 2;
  bool present = 3;
}

message TimerFired {
  InvocationId invocation_id = 1;
  uint32 sleep_index = 2;
  uint64 fire_at_ms = 3;
}

message PurgeInvocation {
  InvocationId invocation_id = 1;
}

// InvocationStatus discriminated union.
// Mirrors restate storage-api/src/invocation_status_table/mod.rs:141-155.
message InvocationStatus {
  oneof status {
    Free free = 1;
    Scheduled scheduled = 2;
    Invoked invoked = 3;
    Suspended suspended = 4;
    Completed completed = 5;
  }
}

message Free {}

message Scheduled {
  InvocationTarget target = 1;
  bytes input = 2;
  fixed64 created_at_ms = 3;
  // ParentLink is set when this invocation is a callee. Propagated through
  // every status transition until Completed, where the apply arm consumes
  // it to journal JECallResult on the parent. Phase 2.5.
  ParentLink parent_link = 4;
}

message Invoked {
  InvocationTarget target = 1;
  fixed64 created_at_ms = 2;
  fixed64 invoked_at_ms = 3;
  ParentLink parent_link = 4;
}

message Suspended {
  InvocationTarget target = 1;
  fixed64 suspended_at_ms = 2;
  repeated string awaiting_on = 3;
  ParentLink parent_link = 4;
}

message Completed {
  InvocationTarget target = 1;
  bytes output = 2;
  string failure_message = 3;
  fixed64 completed_at_ms = 4;
}

// KeyLeaseStatus is the per-(service, object_key) gate enforcing the
// Virtual Object single-writer invariant. Persisted in KeyLeaseTable; the
// apply path fires the per-key FSM (internal/engine/object_fsm.go) which
// reads and writes this message in the same Pebble batch as the invocation
// status transition. Phase 3.
//
// state==IDLE   : no invocation holds the lease; current_invocation unset;
//                 queue empty.
// state==ACTIVE : current_invocation holds the lease; queue is the FIFO
//                 of pending invocations waiting to run next.
message KeyLeaseStatus {
  enum State {
    IDLE = 0;
    ACTIVE = 1;
  }
  State state = 1;
  InvocationId current_invocation = 2;
  repeated InvocationId queue = 3;
}

// DedupEntry — value stored in the dedup table (per-producer max-seen seq).
message DedupEntry {
  uint64 seq = 1;
  uint64 leader_epoch = 2;
}

// PartitionMeta is the per-shard singleton holding the shard's applied Raft
// index and leader-epoch view. Stored under the `meta` key in each shard's
// own Pebble DB. NOT the cluster-wide metadata — that lives in the metadata
// shard's own state (defined when Phase 4 lands; SAD §6.2).
message PartitionMeta {
  uint64 applied_index = 1;
  uint64 leader_epoch = 2;
  uint64 latest_announced_epoch = 3;
  // next_outbox_seq is the next sequence number the leader will allocate
  // when appending to OutboxTable. Survives restarts so re-injected
  // commands keep monotonic ordering. Phase 2.
  uint64 next_outbox_seq = 4;
}

// AwakeableEntry is the directory row keyed by awakeable_id, pointing back
// at the owning invocation and the journal index that minted it. Lets
// ingress find the right partition to propose AwakeableResolved on. Phase 2.
message AwakeableEntry {
  InvocationId owner = 1;
  uint32 entry_index = 2;
}

// OutboxEnvelope is the row stored in the outbox/<seq> namespace. The
// leader-side shuffler scans these and re-injects each one as a Command
// (InvokeCommand) or InvokerEffect (SignalDelivered) on the appropriate
// partition. Phase 2 only emits the invoke variant; SignalSend is wired
// when JESignal lands in Step 7. Reserved variants live above tag 15.
message OutboxEnvelope {
  oneof kind {
    InvokeCommand invoke = 1;
    SignalSend signal = 2;
  }
}

// SignalSend is the outbox payload for a JESignal journal entry. Same
// shape as JESignal — repeated here so the outbox row is self-contained
// (the shuffler does not need to load the journal to re-inject).
message SignalSend {
  InvocationId target_invocation_id = 1;
  string signal_name = 2;
  bytes payload = 3;
}

// SnapshotMeta is the operator-visible sidecar accompanying each snapshot
// blob in the SnapshotRepository. Marshaled as protojson so `cat` / `jq`
// work on the artifact:
//
//   {prefix}/p{shard_id:08d}/snapshot-{raft_index:020d}.tar
//   {prefix}/p{shard_id:08d}/snapshot-{raft_index:020d}.meta.json
//
// Phase 4+. See SAD §6.12.
message SnapshotMeta {
  uint64 shard_id = 1;
  uint64 raft_index = 2;
  uint64 leader_epoch = 3;
  string reflow_version = 4;
  // Hex-encoded SHA-256 of the snapshot tar body.
  string checksum_sha256 = 5;
  fixed64 created_at_ms = 6;
}
