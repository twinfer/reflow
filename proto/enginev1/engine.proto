// Reflow engine wire types — the Raft + on-disk Command/Envelope/Row
// shapes that every shard applies.
//
// All commands flow through the same dragonboat IOnDiskStateMachine
// (Partition). The only thing distinguishing a metadata shard
// (shardID=0) from a partition shard (shardID=1..N) at the wire level is
// which Command variants the shard accepts — see the Command message
// tag allocations below.
syntax = "proto3";

package reflow.engine.v1;

option go_package = "github.com/twinfer/reflow/proto/enginev1;enginev1";

// InvocationId carries the partition_key inside the ID so routing never needs
// to re-parse the target. Mirrors restate types/identifiers.rs:456-461.
message InvocationId {
  fixed64 partition_key = 1;
  bytes uuid = 2; // 16 bytes
}

message InvocationTarget {
  string service_name = 1;
  string handler_name = 2;
  string object_key = 3; // empty for unkeyed services
}

// Deduplication strategy. SelfProposal is stamped on leader-originated
// proposals; Arbitrary on ingress and cross-shard outbox traffic.
message Dedup {
  oneof kind {
    SelfProposalDedup self_proposal = 1;
    ArbitraryDedup arbitrary = 2;
  }
}

message SelfProposalDedup {
  uint64 leader_epoch = 1;
  uint64 seq = 2;
}

message ArbitraryDedup {
  string producer_id = 1;
  uint64 seq = 2;
}

// Envelope wraps every Raft command. precondition is optional: when set,
// the apply path consults the FSM's table-revision singleton before
// mutating and rejects the command (without halting the shard) when the
// stored revision differs. See Precondition below.
message Envelope {
  Header header = 1;
  Command command = 2;
  Precondition precondition = 3;
}

// Precondition is the compare-and-swap gate carried by CAS-aware
// commands. Empty (or if_table_revision_eq=0) means "no precondition";
// any non-zero value requires the applicable table's revision singleton
// to equal it exactly. On mismatch the FSM stamps
// statemachine.Result.Value=1 and skips the mutation; the admin server
// helper translates that sentinel into connect.CodeFailedPrecondition.
//
// One Precondition shape is shared across every CAS-aware command
// (UpsertEventSource, DeleteEventSource, ...) because every such
// command targets exactly one shard-0 table, and the apply arm knows
// which table-prefix to read.
message Precondition {
  uint64 if_table_revision_eq = 1;
}

// TableRevision is the per-table singleton row used for CAS. Stored at
// `<table_prefix>__rev` on shard 0. revision is monotonically
// incremented on every successful mutation of the owning table;
// updated_at_ms is stamped from the FSM apply path's wall clock and is
// advisory (replays don't need to round-trip the timestamp).
message TableRevision {
  uint64 revision = 1;
  fixed64 updated_at_ms = 2;
}

message Header {
  Dedup dedup = 1;
  fixed64 created_at_ms = 2;
  // principal is the auth principal that originated this command,
  // captured at the admin/config Connect propose sites from
  // auth.PrincipalFromContext (e.g. "operator/alice", "tenant/42",
  // "node/3"). Used exclusively by the cluster-FSM audit log
  // (AuditLogTable); the FSM apply path does not gate behavior on it
  // (real authz is enforced at the Connect layer before propose).
  // FSM-self-proposed commands (rebalancer, lp-mover, audit GC,
  // partition timer/outbox) leave it empty — audit records carry
  // principal="engine" in that case. Partition-shard commands
  // (Invoke, TimerFired, ...) do not populate this field; invocation
  // submits are metrics, not audit signal.
  string principal = 4;
}

// Command oneof. Mirrors restate CommandKind in
// crates/wal-protocol/src/v2.rs:222-283.
//
// Tags are grouped by which shards accept the variant: 1 is universal
// (AnnounceLeader), 2-5 / 16-17 / 19-20 are partition-shard commands,
// 6-10 / 18 / 21-26 are metadata-shard commands. Group new variants
// under the matching block when adding.
message Command {
  oneof kind {
    AnnounceLeader announce_leader = 1;
    InvokeCommand invoke = 2;
    InvokerEffect invoker_effect = 3;
    TimerFired timer_fired = 4;
    PurgeInvocation purge = 5;
    // Metadata-shard membership commands. Accepted only by shardID=0.
    RegisterNode register_node = 6;
    UpdatePartitionTable update_partition_table = 7;
    // Metadata-shard rebalance commands. Accepted only by shardID=0.
    // EvictNode marks a node dead; the metadata-leader rebalancer
    // observes and drives RebalanceStep sequences against dragonboat.
    EvictNode evict_node = 8;
    BeginRebalanceStep begin_rebalance_step = 9;
    CompleteRebalanceStep complete_rebalance_step = 10;
    // Partition-shard cross-shard delivery commands. The outbox
    // shuffler ferries DeliverCallResult to the parent's shard and
    // OutboxAck back to the producer's shard; both ride the same
    // Delivery gRPC + Raft pipeline as Invoke. Accepted only by
    // shardID >= 1.
    DeliverCallResult deliver_call_result = 16;
    OutboxAck outbox_ack = 17;
    // RegisterDeployment registers a Deployment (a (url, handlers[])
    // bundle) into shard 0's DeploymentTable. Proposed by the
    // operator-facing Config RegisterDeployment RPC; replays route to
    // the same record so deployment_id pinning survives restarts.
    // Honors Envelope.precondition.if_table_revision_eq when set; the
    // bootstrap-seed path leaves it zero (CAS off). Bumps
    // RevisionTableDeployment on apply. Accepted only by shardID=0.
    RegisterDeployment register_deployment = 18;
    // DeleteDeployment removes one DeploymentTable row and evicts any
    // DeploymentIndexTable (service, handler) → id entries that
    // pointed to this id. Same CAS + revision-bump semantics as the
    // Upsert/Delete pair on other tables; safety (the "is this
    // deployment in use" check) lives in the server's force gate, not
    // here. Accepted only by shardID=0.
    DeleteDeployment delete_deployment = 38;
    // PromiseCompletionAck is the cross-partition ack of a
    // JECompletePromise that landed on the workflow's owning shard.
    // The resolver shard appends JEPromiseCompleteResult on the caller's
    // journal at result_completion_id and wakes the resolver. Accepted
    // only by shardID >= 1.
    PromiseCompletionAck promise_completion_ack = 19;
    // ReapInvocation is proposed by the leader-only ReapService when a
    // Completed invocation's retention window elapses. Apply arm deletes
    // the invocation's inv/journal/signal_* rows (the shared purge body)
    // and the originating reap row; if the invocation is a workflow run
    // it additionally clears the entity-scoped state / promise /
    // workflow_run rows for its (service, key). Accepted only by
    // shardID >= 1.
    ReapInvocation reap_invocation = 20;
    // UpsertSecret / DeleteSecret carry shard-0 SecretStore records —
    // named ciphertext + KEK pointers shared across webhook (and
    // future) consumers. Same CAS + notifier semantics as the
    // event-source and webhook pairs. The plaintext never appears in
    // these commands; per-node SecretStore Reconcilers fetch the
    // blob and decrypt via the Tink registry at reconcile time.
    // Accepted only by shardID=0.
    UpsertSecret upsert_secret = 25;
    DeleteSecret delete_secret = 26;
    // UpsertModel / DeleteModel carry shard-0 ModelTable rows — BPMN/CMMN
    // model definitions (model_ref + inlined XML) the per-node iflowengine
    // TableResolver reconciles into parsed graphs + resolved
    // historyTimeToLive. Same CAS + notifier semantics as the secret pair;
    // the XML is inlined (models are KB-scale deployment artifacts, like a
    // discovery manifest). Accepted only by shardID=0.
    UpsertModel upsert_model = 52;
    DeleteModel delete_model = 53;
    // UpsertLPOwner / DeleteLPOwner / BulkUpsertLPOwners carry shard-0
    // LPOwnersTable mutations — the (lp → shard_id) routing table that
    // Partitioner reads via per-node reconciler snapshot. Same CAS +
    // notifier semantics as the event-source / webhook / secret pairs.
    // BulkUpsertLPOwners is used by the metadata-leader bootstrap to
    // seed the consistent-hash assignment (buraksezer/consistent +
    // xxhash, deterministic across leaders) for all 4096 LPs in one
    // apply batch; UpsertLPOwner is the per-row arm the lpMover uses
    // to atomically flip ownership after a transfer (PR 3); DeleteLPOwner
    // is defensive (no current caller). Accepted only by shardID=0.
    UpsertLPOwner upsert_lp_owner = 27;
    DeleteLPOwner delete_lp_owner = 28;
    BulkUpsertLPOwners bulk_upsert_lp_owners = 29;
    // LP transfer coordination commands. The lpMover goroutine on the
    // shard-0 leader writes LPTransferTable rows (one per in-progress
    // transfer) and advances each through the saga phases (INIT →
    // FROZEN → SHIPPING → STAGED → FLIPPED → CLEANED, or ABORTING →
    // ABORTED on failure). All three CAS via
    // Envelope.precondition against RevisionTableLPTransfers and fire
    // the LPTransfersTable notifier. Accepted only by shardID=0.
    InitiateLPTransfer initiate_lp_transfer = 30;
    UpdateLPTransferPhase update_lp_transfer_phase = 31;
    RemoveLPTransfer remove_lp_transfer = 32;
    // LP transfer mechanics commands. The lpMover ships these via
    // CrossShardSender to source/dest partition shards; the apply path
    // there installs the freeze, stages incoming rows, range-deletes the
    // LP keyspace on source after the ownership flip, or rolls back on
    // abort. Accepted only by shardID >= 1.
    BeginLPTransfer begin_lp_transfer = 33;
    ApplyLPTransferSST apply_lp_transfer_sst = 34;
    CommitLPTransfer commit_lp_transfer = 35;
    FinishLPTransfer finish_lp_transfer = 36;
    AbortLPTransfer abort_lp_transfer = 37;
    // Process-execution commands (iflow BPMN/CMMN durable backend). The
    // partition leader's procSession runs the iflow engine on an instance
    // and proposes ProcessAdvanced (new state blob + reflow-native
    // instructions); ProcessEvent feeds an instance one step — the start
    // event plus every service-task / timer / signal completion that wakes
    // it. Accepted only by shardID >= 1.
    ProcessEvent process_event = 40;
    ProcessAdvanced process_advanced = 41;
    // DeliverProcessMessage correlates an inbound message to parked instances:
    // it lands on the partition owning (tenant, message_name, correlation_key),
    // scans MessageSubscriptionTable, and fans a ProcessMessageReceived event
    // out to each subscribed instance. ProcessSubscribe records one such
    // subscription written by actuateProcessInstructions — applied locally, or
    // re-injected here after riding OutboxEnvelope.process_subscribe cross-shard
    // to the partition that owns the message routing key. Accepted only by
    // shardID >= 1.
    DeliverProcessMessage deliver_process_message = 42;
    ProcessSubscribe process_subscribe = 43;
    // ProcessUnsubscribe deletes a parked MessageSubscription on the partition
    // owning the message routing key — the teardown counterpart of
    // ProcessSubscribe (cross-shard via OutboxEnvelope.process_unsubscribe).
    // Accepted only by shardID >= 1.
    ProcessUnsubscribe process_unsubscribe = 44;
    // ReapProcessInstance deletes a terminal instance's retained record when its
    // ProcessTerminal.retention_ms history window elapses — the process-plane
    // analog of ReapInvocation, proposed by the leader's process reaper.
    // Accepted only by shardID >= 1.
    ReapProcessInstance reap_process_instance = 51;
    // SetRebalanceDrain marks a partition shard as drained (drain=true)
    // or undrained (drain=false) in shard 0's RebalanceDrainTable. The
    // autonomous rebalancer subtracts drained shards from the planner's
    // input set, naturally moving every LP owned by the drained shard
    // off via the same Command_InitiateLPTransfer path the manual
    // `reflowd cluster transfer-lp` CLI uses. Honors
    // Envelope.precondition.if_table_revision_eq when set; bumps
    // RevisionTableRebalanceDrain on apply. Accepted only by shardID=0.
    SetRebalanceDrain set_rebalance_drain = 39;
    // UpsertCARoot / DeleteCARoot carry shard-0 CARootTable mutations
    // — the cluster CA cert (PEM) plus a pointer to the SecretTable row
    // holding the AEAD-wrapped private key. Same CAS + notifier
    // semantics as the secret pair. The signing key never appears in
    // these commands; per-node certmgr.ClusterIssuer fetches the blob
    // and decrypts via secretstore.LookupForCASigning at reconcile
    // time. Accepted only by shardID=0.
    UpsertCARoot upsert_ca_root = 45;
    DeleteCARoot delete_ca_root = 46;
    // UpsertJoinToken / ConsumeJoinToken / DeleteJoinToken carry shard-0
    // JoinTokenTable mutations — the kubeadm-style one-time bootstrap
    // credentials a joiner exchanges via MeshSign for a signed leaf.
    // Tokens are stored as HMAC-hashed records (plaintext shown once at
    // creation); ConsumeJoinToken uses if_table_revision_eq CAS to
    // atomically mark single_use tokens as consumed in the same apply
    // batch as the bootstrap server's signing decision. Accepted only
    // by shardID=0.
    UpsertJoinToken upsert_join_token = 47;
    ConsumeJoinToken consume_join_token = 48;
    DeleteJoinToken delete_join_token = 49;
    // UpsertPlatformConfig replaces shard 0's PlatformConfigRecord singleton
    // (cluster-wide platform policy; v1 = Cedar cluster authz policy text).
    // Honors Envelope.precondition.if_table_revision_eq; bumps
    // RevisionTablePlatformConfig and fires the PlatformConfigTable notifier
    // so each node's authz reconciler recompiles the live policy set.
    // Accepted only by shardID=0.
    UpsertPlatformConfig upsert_platform_config = 50;
  }
}

// AnnounceLeader is proposed on every shard when its leader changes. It is
// the only Command variant accepted by both the metadata shard (shardID=0)
// and partition shards (shardID=1..N).
//
// partition_key_start and partition_key_end describe the partition-key range
// this shard owns; meaningful for partition shards only. The metadata shard
// sets both to 0.
message AnnounceLeader {
  uint64 node_id = 1;
  uint64 leader_epoch = 2;
  fixed64 partition_key_start = 3;
  fixed64 partition_key_end = 4;
}

message InvokeCommand {
  InvocationId invocation_id = 1;
  InvocationTarget target = 2;
  bytes input = 3;
  string idempotency_key = 4;
  // ParentLink is set when this invocation is the callee of a ctx.Call from
  // another invocation. The receiving partition's FSM propagates it onto the
  // callee's status so the callee's Completed apply arm can journal a
  // JECallResult back on the parent.
  ParentLink parent_link = 5;
  // deployment_id pins this invocation to the deployment that owned the
  // (service, handler) routing at submit time. The apply arm copies it
  // onto InvocationStatus; replays route to the same deployment even when
  // a newer deployment for the same (service, handler) has since landed.
  // Empty string when the host has no deployment table (single-node mode
  // without shard 0).
  string deployment_id = 6;
  // kind is the addressing model the deployment advertises for this
  // handler — mirrors protocolv1.Kind (1=service, 2=object, 3=workflow,
  // 4=workflow_shared). Ingress resolves it during submit so the apply
  // path can decide whether to apply workflow single-run-per-key dedup.
  // 0 (unspecified) is tolerated; the apply path treats it as "no
  // workflow lifecycle".
  uint32 kind = 7;
  // Opaque caller-supplied metadata persisted with the invocation. The
  // apply arm copies this onto JEInput.metadata so the SDK can read it
  // via ctx.Metadata() on replay. The engine itself never interprets
  // the values.
  map<string, string> metadata = 8;
}

// ParentLink references the parent that spawned a callee. Exactly one case is
// set. parent_id + call_index: an invocation parent (ctx.Call) — the callee's
// JECallResult lands on the parent's journal at call_index + 1. process_parent:
// an iflow process instance that dispatched a service task or child activity —
// the callee's terminal apply delivers a Command_ProcessEvent back to the
// instance instead (see applyTerminalCompletion / onProcessAdvanced terminal).
message ParentLink {
  InvocationId parent_id = 1;
  uint32 call_index = 2;
  ProcessParent process_parent = 3;
}

// ProcessParent routes a child's terminal result back to a process instance as
// a Command_ProcessEvent (task_completed / child_completed), correlated to the
// element that spawned it. pk routes to the instance's shard; node_id is the
// BPMN/CMMN element awaiting the result.
message ProcessParent {
  fixed64 pk = 1;
  string service = 2;
  string instance_key = 3;
  string node_id = 4;
  string instance_idx = 5;
}

message InvokerEffect {
  InvocationId invocation_id = 1;
  oneof kind {
    JournalEntryAppended journal_appended = 2;
    InvocationCompleted completed = 3;
    InvocationSuspended suspended = 4;
    JERunProposal run_proposal = 5;
    AwakeableResolved awakeable_resolved = 6;
    SignalDelivered signal_delivered = 7;
    // PromiseCompleted is the receiver-side effect when an external
    // caller resolves/rejects a workflow promise via
    // Ingress.ResolveWorkflowPromise. Routed by (service, workflow_key)
    // via Partitioner.ShardForTarget. The apply arm writes PromiseValue
    // and wakes any awaiter in the same batch; InvokerEffect.invocation_id
    // is unset for this variant.
    PromiseCompleted promise_completed = 8;
  }
}

// JERunProposal carries the outcome of a deterministic side-effect block
// (ctx.Run) from the SDK back to the engine. The FSM applies it by writing
// a JERun journal entry at entry_index and acking the SDK.
//
// Retry fields:
//   retryable    — set when the SDK classified fn's error as non-terminal
//                  (anything other than *sdk.Failure). When true the engine
//                  may compute a backoff via internal/engine/retry.go and
//                  reschedule the body. Defaults to false → terminal.
//   attempt      — zero-based retry count this proposal carries: 0 on the
//                  first failure, N on the (N+1)th attempt. Echoes from the
//                  prior JERun.attempt + 1 on re-runs.
//   retry_policy — caller-supplied policy (echoed from StartInvocation
//                  on each proposal so the apply arm needs no per-invocation
//                  status fields). Zero values fall back to defaults
//                  defined in internal/engine/retry.go.
message JERunProposal {
  uint32 entry_index = 1;
  bytes value = 2;
  string failure_message = 3;
  bool retryable = 4;
  uint32 attempt = 5;
  RunRetryPolicy retry_policy = 6;
}

// AwakeableResolved is proposed by the partition that owns the resolving
// invocation when an external caller resolves an awakeable. The FSM appends
// a JEAwakeableResult to the owner's journal and wakes the suspended
// invocation if needed.
message AwakeableResolved {
  string awakeable_id = 1;
  bytes value = 2;
  string failure_message = 3;
}

// SignalDelivered is the receiver-side effect when a JESignal lands on its
// target. target identifies (service, key) — the apply arm resolves it to
// an active InvocationId via KeyLeaseTable.current_invocation before
// dispatching the signal. The surrounding InvokerEffect.invocation_id is
// zero for this variant: signals do not know the receiver's id at send
// time (sender knows only the Target), and routing is by Target hash via
// Partitioner.ShardForTarget at the sender shard.
message SignalDelivered {
  InvocationTarget target = 1;
  string signal_name = 2;
  bytes payload = 3;
  // tenant is forward-carried from SignalSend so the receiver's key-lease
  // lookup bands the target pk under the sender's tenant. 0 = default.
  uint32 tenant = 4;
}

// PromiseCompleted is proposed by ingress (or relayed across partitions
// via OutboxEnvelope.PromiseCompletion) when a caller resolves or
// rejects a workflow-scoped promise. The apply arm writes a Resolved
// or Rejected PromiseValue (if not already terminal) and wakes any
// awaiter in the same batch. value and failure_message are mutually
// exclusive — failure_message non-empty = reject.
//
// caller_id + result_completion_id are set only when the message came
// from a cross-partition handler that journaled a JECompletePromise
// and is awaiting an ack at result_completion_id on its own journal.
// Direct ingress paths (ResolveWorkflowPromise) leave both zero — the
// RPC reply already carries the succeeded/conflict signal.
message PromiseCompleted {
  string service = 1;
  string workflow_key = 2;
  string promise_name = 3;
  bytes value = 4;
  string failure_message = 5;
  InvocationId caller_id = 6;
  uint32 result_completion_id = 7;
  // tenant is the band of the workflow being resolved, forward-carried so
  // the owner shard keys promise/awaiter rows under the right LP band. From
  // the ingress principal (ResolveWorkflowPromise) or the resolver
  // invocation's band (cross-partition JECompletePromise). 0 = default.
  uint32 tenant = 8;
}

// PromiseCompletionAck is the cross-partition ack that informs the
// resolver's shard whether its JECompletePromise won or hit an
// already-completed conflict on the workflow's owning shard. Carried
// in OutboxEnvelope.promise_completion_ack from owner shard back to
// resolver shard. Apply path appends JEPromiseCompleteResult at
// result_completion_id on caller_id's journal and wakes the resolver.
message PromiseCompletionAck {
  InvocationId caller_id = 1;
  uint32 result_completion_id = 2;
  bool succeeded = 3;
  string failure_message = 4;
}

// ReapInvocation tells the apply path to purge a Completed invocation's
// durable footprint when its retention window elapses. Always deletes
// the per-invocation rows — inv/<id>, journal/<id>/*, signal_inbox /
// signal_awaiter for the id — plus the originating reap/<fire_at>/<id>
// row. If the invocation is the workflow run for its (service, key)
// (workflow_run still points at this id), it additionally clears the
// entity-scoped state/<svc>/<key>/..., promise/..., promise_awaiter/...,
// and workflow_run/<svc>/<key> rows. Proposed only by the leader's
// ReapService; idempotent (re-application finds the row already Free and
// the reap row gone). State for a plain invocation or a re-claimed
// virtual-object key is left untouched.
message ReapInvocation {
  InvocationId invocation_id = 1;
  // fire_at_ms identifies the originating reap row so the apply arm can
  // delete it in the same batch. Echoed from the service's scan.
  fixed64 fire_at_ms = 2;
}

message JournalEntryAppended {
  uint32 command_index = 1;
  JournalEntry entry = 2;
}

message InvocationCompleted {
  bytes output = 1;
  string failure_message = 2;
  // failure_code mirrors *sdk.Failure.Code so terminal cancellations and
  // other typed failures can be distinguished from plain string messages.
  // 0 = no code; non-zero matches the handler's Failure.Code. Reserved
  // codes:
  //   9001 = step budget exhausted
  //   9002 = invocation cancelled
  uint32 failure_code = 3;
  // Retention windows (ms) resolved by the invoker from the completing
  // invocation's DeploymentRecord. The partition apply path can't read
  // shard-0's DeploymentTable, so the invoker carries the effective
  // windows here; applyTerminalCompletion picks invocation_retention_ms
  // or workflow_retention_ms by the workflow_run match and schedules the
  // reap. 0 (e.g. the apply-side cancel synthesis, which has no invoker)
  // falls back to the engine limits default.
  uint64 invocation_retention_ms = 4;
  uint64 workflow_retention_ms = 5;
}

message InvocationSuspended {
  repeated string awaiting_on = 1;
}

// JournalEntry. Mirrors restate journal_v2 Command+Notification flat union
// at types/src/journal_v2/mod.rs:60-150.
//
// Tags grouped by feature area:
//   2-9   : baseline (Input, Sleep+Result, Call+Result, Get/SetState, Output).
//   10-14 : Run, Awakeable+Result, Signal, ClearState.
//   16-17 : ClearAllState, OneWayCall.
//   18-19 : AwaitSignal + SignalResult.
//   20-24 : Promise (Get+Result, Peek, Complete+CompleteResult).
//   25-28 : Lazy state (GetStateResult, GetStateKeys, GetStateKeysResult,
//           JEGetEagerStateKeys).
message JournalEntry {
  uint32 index = 1;
  oneof entry {
    JEInput input = 2;
    JESleep sleep = 3;
    JESleepResult sleep_result = 4;
    JECall call = 5;
    JECallResult call_result = 6;
    JEGetState get_state = 7;
    JESetState set_state = 8;
    JEOutput output = 9;
    JERun run = 10;
    JEAwakeable awakeable = 11;
    JEAwakeableResult awakeable_result = 12;
    JESignal signal = 13;
    JEClearState clear_state = 14;
    JEClearAllState clear_all_state = 16;
    // Fire-and-forget call. Single-slot (no result variant); the apply
    // path enqueues an OutboxEnvelope to the receiver partition exactly
    // like JECall but never waits for a JECallResult.
    JEOneWayCall one_way_call = 17;
    // Two-slot signal await: ctx.WaitSignal(name) journals a JEAwaitSignal
    // at slot N; the apply arm writes a SignalAwaiter directory row keyed
    // by (inv, name) and probes signal_inbox/<inv>/<name>. On a hit, a
    // JESignalResult lands at slot N+1 inline. On miss, the directory row
    // waits for a future InvokerEffect.SignalDelivered to stitch the result.
    JEAwaitSignal await_signal = 18;
    JESignalResult signal_result = 19;
    // Two-slot durable promise wait: Promise(name).Result() journals
    // JEGetPromise at slot N; the apply arm reads the PromiseValue row.
    // If resolved/rejected, a JEPromiseResult lands at slot N+1 inline.
    // If pending, a PromiseAwaiter row is written and the result waits
    // for a future JECompletePromise (same workflow) or
    // InvokerEffect.PromiseCompleted (ingress) to stitch the result.
    JEGetPromise get_promise = 20;
    JEPromiseResult promise_result = 21;
    // Single-slot promise snapshot: Promise(name).Peek() journals
    // JEPeekPromise with the captured value/failure/completed flag
    // inline. Store-only on replay — the apply arm reads PromiseValue
    // once and stamps the snapshot onto the journal entry.
    JEPeekPromise peek_promise = 22;
    // Two-slot promise completion: Promise(name).Resolve / Reject
    // journals JECompletePromise at slot N. The apply arm writes
    // PromiseValue if not already completed, then appends a
    // JEPromiseCompleteResult at slot N+1 reporting succeeded /
    // already-completed; concurrent awaiter (if any) is woken in the
    // same batch.
    JECompletePromise complete_promise = 23;
    JEPromiseCompleteResult promise_complete_result = 24;
    // Two-slot lazy state read: ctx.GetState(key) journals JEGetState at
    // slot N when the eager-preload snapshot didn't cover the key (i.e.
    // StartMessage.partial_state=true). The apply arm reads StateTable
    // and appends JEGetStateResult at result_completion_id (= N+1) in
    // the same batch.
    JEGetStateResult get_state_result = 25;
    // Two-slot lazy state keys read: ctx.GetStateKeys() journals
    // JEGetStateKeys at slot N; the apply arm scans the StateTable
    // prefix and appends JEGetStateKeysResult at result_completion_id
    // (= N+1) in the same batch.
    JEGetStateKeys get_state_keys = 26;
    JEGetStateKeysResult get_state_keys_result = 27;
    // Single-slot eager-keys read: ctx.GetStateKeys() emits this when
    // StartMessage.partial_state=false. The SDK builds the sorted key
    // list from its local state cache (which mirrors StartMessage.state_map
    // plus session writes) and ships it inline; the apply arm trusts the
    // payload and stamps it as-is. No completion notification — the SDK
    // already has the answer locally.
    JEGetEagerStateKeys get_eager_state_keys = 28;
  }
}

message JEInput {
  bytes value = 1;
  // Opaque caller-supplied metadata captured at submit time. Surfaced
  // to the SDK as InputCommandMessage.headers on the wire; readable
  // via ctx.Metadata() inside the handler. Stable across replays —
  // JEInput is the slot-0 journal entry and the only place metadata
  // is persisted.
  map<string, string> metadata = 2;
}

message JESleep {
  uint64 fire_at_ms = 1;
}

message JESleepResult {
  uint32 sleep_index = 1;
}

message JECall {
  InvocationTarget target = 1;
  bytes input = 2;
  // Optional idempotency key — when set, the apply arm stamps it onto the
  // outgoing OutboxEnvelope.Invoke.InvokeCommand.idempotency_key so the
  // callee's receiving onInvoke dedups against the
  // (service, handler, object_key, idempotency_key) tuple.
  string idempotency_key = 3;
}

// JEOneWayCall records a fire-and-forget invocation. Single-slot —
// unlike JECall there is no companion JECallResult; the apply path
// enqueues an outbox envelope toward the receiver but never plumbs the
// response back to this invocation's journal.
message JEOneWayCall {
  InvocationTarget target = 1;
  bytes input = 2;
  // Same dedup semantics as JECall.idempotency_key — when non-empty,
  // stamped onto the outgoing InvokeCommand so the receiver dedups
  // against the (service, handler, object_key, idempotency_key) tuple.
  string idempotency_key = 3;
}

message JECallResult {
  uint32 call_index = 1;
  bytes result = 2;
  // failure_message is populated when the callee terminated with a failure
  // instead of a result. Mirrors the JEAwakeableResult / JERun shape.
  string failure_message = 3;
}

// JEGetState is the command for ctx.GetState's lazy fetch path. Two-slot
// (this entry + JEGetStateResult at result_completion_id). The apply
// arm resolves StateTable.Get(target, key) on the active invocation's
// (service, object_key) and appends the result inline in the same batch.
message JEGetState {
  string key = 1;
  uint32 result_completion_id = 2;
}

// JEGetStateResult carries the lazy fetch outcome. present=false means
// the key was absent (handler surfaces (nil, false, nil)); present=true
// means value is authoritative even when empty.
message JEGetStateResult {
  bytes value = 1;
  bool present = 2;
}

// JEGetStateKeys is the command for ctx.GetStateKeys. Two-slot (this
// entry + JEGetStateKeysResult at result_completion_id). The apply arm
// scans the StateTable prefix for the active invocation's
// (service, object_key) and appends the sorted key list inline.
message JEGetStateKeys {
  uint32 result_completion_id = 1;
}

// JEGetStateKeysResult carries the lazy keys-scan outcome. keys is the
// (lexicographically ordered) list of state keys present at apply time.
message JEGetStateKeysResult {
  repeated string keys = 1;
}

message JESetState {
  string key = 1;
  bytes value = 2;
}

message JEOutput {
  bytes value = 1;
}

// JERun records the outcome of a deterministic side-effect block. The SDK
// runs the body once, journals (value or failure_message), and replays
// store-only on subsequent retries. attempt is the 1-based count of fn
// invocations completed for this slot (including the one whose outcome
// this entry carries). retryable distinguishes a terminal error (handler
// fails) from a transient one (engine schedules a backoff and re-invokes
// fn). attempt_failures records each retryable failure in order so the
// journal explains why an invocation took N attempts.
message JERun {
  bytes value = 1;
  string failure_message = 2;
  uint32 attempt = 3;
  bool retryable = 4;
  repeated string attempt_failures = 5;
}

// RunRetryPolicy controls exponential backoff for retryable JERun failures.
// Carried on StartInvocation so the SDK can echo it through to the engine
// apply arm without per-Run wire traffic. Zero/absent fields fall back to
// defaults: initial=50ms, factor=2.0, max_interval=10s, max_attempts=64.
// max_attempts=0 means "use the default", NOT unlimited — the engine has
// no cancel/kill primitive today, so unbounded retries would poison the
// VO queue. Callers wanting truly unbounded retries must set max_attempts
// explicitly (e.g. math.MaxUint32).
message RunRetryPolicy {
  uint64 initial_interval_ms = 1;
  double factor = 2;
  uint64 max_interval_ms = 3;
  uint32 max_attempts = 4;
}

// JEClearAllState wipes every state row scoped to the invocation's
// (service, object_key). Empty body: the target is implied by the
// surrounding invocation. Apply arm uses StateTable.RangeDelete.
message JEClearAllState {}

// JEAwakeable is journaled when a handler mints an awakeable. The actual
// resolution arrives later as JEAwakeableResult after an external caller
// hits the ingress resolution endpoint.
message JEAwakeable {
  string awakeable_id = 1;
}

// JEAwakeableResult resolves a previously-minted awakeable. Written by
// the FSM in response to InvokerEffect.AwakeableResolved.
message JEAwakeableResult {
  string awakeable_id = 1;
  bytes value = 2;
  string failure_message = 3;
}

// JESignal is sender-side: the journal entry an invocation writes when it
// sends a signal to another invocation. Addressed by Target (service +
// key); the receiver shard resolves Target → active InvocationId via
// KeyLeaseTable.current_invocation in its SignalDelivered apply arm. The
// receiver-side effect is InvokerEffect.SignalDelivered.
message JESignal {
  InvocationTarget target = 1;
  string signal_name = 2;
  bytes payload = 3;
}

// JEAwaitSignal is journaled by the SDK when ctx.WaitSignal(name) is
// called. Two-slot: this entry at index N, with the resolution
// JESignalResult landing at result_completion_id (= N+1) once a signal
// arrives. The apply arm writes a SignalAwaiter directory row keyed by
// (inv, name) so a future InvokerEffect.SignalDelivered can find the
// awaiting slot.
message JEAwaitSignal {
  string signal_name = 1;
  uint32 result_completion_id = 2;
}

// JESignalResult resolves a previously-journaled JEAwaitSignal. Written
// by the FSM on inbox-hit (synchronous) or on a later SignalDelivered
// effect (asynchronous). signal_name + payload are echoed so the SDK
// future surfaces them.
message JESignalResult {
  string signal_name = 1;
  bytes payload = 2;
}

// SignalAwaiter is the per-(inv, name) directory row written when a
// JEAwaitSignal lands without a matching inbox entry. Stored at
// signal_awaiter/<inv_id>/<name>. The owner field is redundant with
// the key but mirrors AwakeableEntry for symmetry.
message SignalAwaiter {
  InvocationId owner = 1;
  uint32 entry_index = 2;  // slot of JEAwaitSignal; result lands at +1
}

// SignalInboxEntry is the persisted buffered signal. Stored at
// signal_inbox/<inv_id>/<name>. Last-writer-wins per name: a second
// signal with the same name overwrites the first while it sits
// unconsumed. Cleared on consumption (a matching WaitSignal) and on
// invocation purge.
message SignalInboxEntry {
  string signal_name = 1;
  bytes payload = 2;
  fixed64 delivered_at_ms = 3;
}

// JEGetPromise is journaled by the SDK when Promise(name).Result() is
// called. Two-slot: this entry at slot N, with the resolution
// JEPromiseResult landing at result_completion_id (= N+1) once the
// promise is completed. The apply arm reads promise/<svc>/<key>/<name>;
// on a Resolved/Rejected hit it appends JEPromiseResult inline, on
// pending/absent it writes a PromiseAwaiter directory row so a future
// JECompletePromise (or external resolve) can find the awaiting slot.
message JEGetPromise {
  string name = 1;
  uint32 result_completion_id = 2;
  // Explicit promise scope. service + workflow_key locate the promise
  // row + awaiter row independent of the calling invocation's own
  // (svc, key). Required: empty values are treated as malformed.
  string service = 3;
  string workflow_key = 4;
}

// JEPromiseResult resolves a previously-journaled JEGetPromise. Written
// by the FSM on synchronous (already-resolved) Get or on a later
// JECompletePromise / InvokerEffect.PromiseCompleted. failure_message is
// non-empty when the promise was rejected; mutually exclusive with value.
message JEPromiseResult {
  string name = 1;
  bytes value = 2;
  string failure_message = 3;
}

// JEPeekPromise records a non-blocking snapshot of promise state. Single
// slot — the apply arm reads PromiseValue once and stamps the snapshot
// directly onto this journal entry. completed=false means "still pending
// or absent"; completed=true + (value | failure_message) carries the
// terminal outcome. Store-only on replay.
message JEPeekPromise {
  string name = 1;
  bool completed = 2;
  bytes value = 3;
  string failure_message = 4;
  // Explicit promise scope (see JEGetPromise).
  string service = 5;
  string workflow_key = 6;
}

// JECompletePromise is journaled by the SDK when Promise(name).Resolve
// or Reject is called. Two-slot: this entry at slot N, with
// JEPromiseCompleteResult landing at result_completion_id (= N+1)
// reporting succeeded or already-completed. The apply arm writes
// PromiseValue (when not already terminal) and wakes any awaiter in
// the same batch.
message JECompletePromise {
  string name = 1;
  bytes value = 2;
  string failure_message = 3;  // non-empty = reject; mutually exclusive with value
  uint32 result_completion_id = 4;
  // Explicit promise scope (see JEGetPromise). When (service,
  // workflow_key) hashes to a different shard than the resolver's
  // partition, the apply path enqueues an OutboxEnvelope
  // .PromiseCompletion to the owner shard and waits for a
  // PromiseCompletionAck before journaling JEPromiseCompleteResult.
  string service = 5;
  string workflow_key = 6;
}

// JEPromiseCompleteResult acks a JECompletePromise. succeeded=true when
// the apply arm wrote the PromiseValue; succeeded=false (with
// failure_message="promise already completed") when a prior terminal
// state was found and this Resolve/Reject became a no-op.
message JEPromiseCompleteResult {
  bool succeeded = 1;
  string failure_message = 2;
}

// PromiseValue is the persisted state of a workflow-scoped durable
// promise. Stored at promise/<service>/<workflow_key>/<name>. Lifetime
// is the workflow's retention window: created lazily by the first
// Get/Peek/Complete that touches the name and removed by the workflow
// reaper when the owning run is purged.
message PromiseValue {
  oneof state {
    Pending pending = 1;
    Resolved resolved = 2;
    Rejected rejected = 3;
  }
  fixed64 created_at_ms = 4;
}

// Pending is the lazy-created sentinel state. A Get/Peek that arrives
// before any Complete writes a Pending row so a later Complete can
// detect the conflict (it never does — Complete is the only writer; the
// reader path doesn't create rows). Retained as an explicit state so
// the FSM can express "exists, not terminal" distinctly from absent.
message Pending {}

message Resolved {
  bytes value = 1;
  fixed64 completed_at_ms = 2;
}

message Rejected {
  string failure_message = 1;
  fixed64 completed_at_ms = 2;
}

// PromiseAwaiter is the per-(svc, key, name) directory row written when
// a JEGetPromise lands on a pending or absent promise. Stored at
// promise_awaiter/<service>/<workflow_key>/<name>. At most one awaiter
// per (svc, key, name); a second Get with the same name overwrites the
// first (documented MVP limitation, same as SignalAwaiter).
message PromiseAwaiter {
  InvocationId owner = 1;
  uint32 entry_index = 2;  // slot of JEGetPromise; result lands at +1
}

// JEClearState records a state deletion.
message JEClearState {
  string key = 1;
}

// JEGetEagerStateKeys is the single-slot eager form of GetStateKeys.
// keys is the sorted list the SDK derived from its local state cache;
// the apply arm trusts the payload and stamps it as-is. No completion
// notification — the SDK already has the answer locally.
message JEGetEagerStateKeys {
  repeated string keys = 1;
}

message TimerFired {
  InvocationId invocation_id = 1;
  uint32 sleep_index = 2;
  uint64 fire_at_ms = 3;
}

message PurgeInvocation {
  InvocationId invocation_id = 1;
}

// InvocationStatus discriminated union.
message InvocationStatus {
  oneof status {
    Free free = 1;
    Scheduled scheduled = 2;
    Invoked invoked = 3;
    Suspended suspended = 4;
    Completed completed = 5;
  }
  // deployment_id pins this invocation to the deployment that owned the
  // (service, handler) routing at the time the InvokeCommand was applied.
  // Stamped once on the Free→Scheduled transition and preserved across
  // every subsequent transition until terminal. Empty string when no
  // deployment table exists (single-node hosts without shard 0).
  string deployment_id = 6;
  // kind mirrors protocolv1.Kind (see InvokeCommand.kind). Pinned at the
  // Free→Scheduled transition like deployment_id; lifecycle code (purge,
  // workflow retention reaper) consults it to decide what to clean up.
  uint32 kind = 7;
}

// InvocationState is the flat projection of InvocationStatus.status used by the
// ListInvocations summary + filter (the oneof case as a single enum). Free is
// not surfaced — a Free row is equivalent to absent and the list scan skips it.
enum InvocationState {
  INVOCATION_STATE_UNSPECIFIED = 0;
  INVOCATION_STATE_SCHEDULED = 1;
  INVOCATION_STATE_INVOKED = 2;
  INVOCATION_STATE_SUSPENDED = 3;
  INVOCATION_STATE_COMPLETED = 4;
}

message Free {}

message Scheduled {
  InvocationTarget target = 1;
  bytes input = 2;
  fixed64 created_at_ms = 3;
  // ParentLink is set when this invocation is a callee. Propagated through
  // every status transition until Completed, where the apply arm consumes
  // it to journal JECallResult on the parent.
  ParentLink parent_link = 4;
  // Caller-supplied metadata captured at submit time. Only Scheduled
  // carries it on the status; once the invoker advances to Invoked it
  // proposes JEInput with the same metadata into the journal, where it
  // is the durable home for the rest of the invocation's lifetime.
  map<string, string> metadata = 5;
}

message Invoked {
  InvocationTarget target = 1;
  fixed64 created_at_ms = 2;
  fixed64 invoked_at_ms = 3;
  ParentLink parent_link = 4;
}

message Suspended {
  InvocationTarget target = 1;
  fixed64 suspended_at_ms = 2;
  repeated string awaiting_on = 3;
  ParentLink parent_link = 4;
}

message Completed {
  InvocationTarget target = 1;
  bytes output = 2;
  string failure_message = 3;
  fixed64 completed_at_ms = 4;
  // failure_code mirrors InvocationCompleted.failure_code so the
  // terminal status preserves the typed failure code (e.g. 9002 for
  // cancellation) across reads.
  uint32 failure_code = 5;
}

// KeyLeaseStatus is the per-(service, object_key) gate enforcing the
// Virtual Object single-writer invariant. Persisted in KeyLeaseTable; the
// apply path fires the per-key FSM (internal/engine/object_fsm.go) which
// reads and writes this message in the same Pebble batch as the invocation
// status transition.
//
// state==IDLE   : no invocation holds the lease; current_invocation unset;
//                 queue empty.
// state==ACTIVE : current_invocation holds the lease; queue is the FIFO
//                 of pending invocations waiting to run next.
message KeyLeaseStatus {
  enum State {
    IDLE = 0;
    ACTIVE = 1;
  }
  State state = 1;
  InvocationId current_invocation = 2;
  repeated InvocationId queue = 3;
}

// DedupEntry — value stored in the dedup table (per-producer max-seen seq).
message DedupEntry {
  uint64 seq = 1;
  uint64 leader_epoch = 2;
}

// PartitionMeta is the per-shard singleton holding the shard's applied Raft
// index and leader-epoch view. Stored under the `meta` key in each shard's
// own Pebble DB. NOT the cluster-wide metadata — that lives in shard 0's
// own state (PartitionTable + NodeMembership rows below; SAD §6.2).
message PartitionMeta {
  uint64 applied_index = 1;
  uint64 leader_epoch = 2;
  uint64 latest_announced_epoch = 3;
  // next_outbox_seq is the next sequence number the leader will allocate
  // when appending to OutboxTable. Survives restarts so re-injected
  // commands keep monotonic ordering.
  uint64 next_outbox_seq = 4;
}

// AwakeableEntry is the directory row keyed by awakeable_id, pointing back
// at the owning invocation and the journal index that minted it. Lets
// ingress find the right partition to propose AwakeableResolved on.
message AwakeableEntry {
  InvocationId owner = 1;
  uint32 entry_index = 2;
}

// OutboxEnvelope is the row stored in the outbox/<seq> namespace. The
// leader-side shuffler scans these and dispatches each one to the
// destination shard: same-shard rows are re-injected locally via
// IngressProposer.ProposeIngress; cross-shard rows are sent over the
// gRPC Delivery service to the destination shard's leader.
//
// destination_shard_id is the target Raft shard. A value of 0 means
// "same shard as the producer" — the dispatcher short-circuits to the
// local re-inject path.
//
// Variant semantics:
//   invoke              — schedule a new invocation on the destination
//                         partition (callee). May carry a ParentLink so
//                         the callee's Completed apply arm knows where
//                         to send the result.
//   signal              — deliver a JESignal payload to a target
//                         invocation living on the destination partition.
//   deliver_call_result — cross-partition CallResult delivery: the
//                         callee partition emits this to the parent's
//                         partition so the parent's apply arm can append
//                         JECallResult and wake the suspended parent.
//   outbox_ack          — cross-shard acknowledgement that an inbound
//                         delivery has been durably applied on the
//                         receiver. The producer shard pops the
//                         corresponding outbox row on apply.
//   promise_completion       — cross-partition DurablePromise.Resolve/Reject
//                              from a child invocation back to the workflow's
//                              owning shard. Wraps PromiseCompleted.
//   promise_completion_ack   — the round-trip companion of promise_completion;
//                              ferried back to the resolver shard so its
//                              JECompletePromise gets a JEPromiseCompleteResult
//                              with succeeded/conflict semantics.
message OutboxEnvelope {
  uint64 destination_shard_id = 3;
  oneof kind {
    InvokeCommand invoke = 1;
    SignalSend signal = 2;
    DeliverCallResult deliver_call_result = 4;
    OutboxAck outbox_ack = 5;
    PromiseCompleted promise_completion = 6;
    PromiseCompletionAck promise_completion_ack = 7;
    ProcessEvent process_event = 8;
    ProcessSubscribe process_subscribe = 9;
    ProcessUnsubscribe process_unsubscribe = 10;
  }
}

// DeliverCallResult is the outbox payload used to ship a callee's result
// back to the parent invocation when caller and callee live on different
// partitions. Mirrors the in-process logic of deliverCallResultToParent
// (partition.go): on apply the receiver loads the parent's
// InvocationStatus, appends a JECallResult journal entry at
// call_index + 1, runs transitionOnCallResultDelivered, and persists in
// the same Pebble batch.
message DeliverCallResult {
  InvocationId parent_id = 1;
  uint32 call_index = 2;
  bytes result = 3;
  string failure_message = 4;
}

// OutboxAck is the outbox payload that pops a previously-sent cross-shard
// outbox row on the producer's shard. The receiver emits an OutboxAck row
// addressed back to the producer in the same Pebble batch as the inbound
// delivery's apply effects. On apply at the producer's shard the row is
// dedup'd (the receiver stamped it with its own outbox/<recvShard> seq)
// and the indicated (producer_shard_id, producer_seq) row is popped from
// OutboxTable.
message OutboxAck {
  uint64 producer_shard_id = 1;
  uint64 producer_seq = 2;
}

// SignalSend is the outbox payload for a JESignal journal entry. Same
// shape as JESignal — repeated here so the outbox row is self-contained
// (the shuffler does not need to load the journal to re-inject).
message SignalSend {
  InvocationTarget target = 1;
  string signal_name = 2;
  bytes payload = 3;
  // tenant is the band of the sending invocation, forward-carried so the
  // receiver routes/keys the target under the same LP band (a signal stays
  // within one tenant). 0 = default/untenanted. See keys.BandLP.
  uint32 tenant = 4;
}

// ── Process-execution payloads (iflow BPMN/CMMN durable backend) ──
//
// One iflow process/case instance maps to a specialized virtual object:
// (service, instance_key) banded by tenant, state in ProcessInstanceTable.
// Only the leader-side procSession links iflow; everything that crosses Raft
// is reflow-native, so the apply arm (every replica) stays iflow-agnostic.

// ProcessEvent drives one instance one step. The start event carries
// model_ref + kind (apply creates the record); later events leave them empty.
// logical_time_ms is the stamped instant procSession feeds to the engine clock,
// so Advance is a pure function of (state, event, time) and re-runs identically
// on a new leader.
message ProcessEvent {
  fixed64 pk = 1; // banded partition_key of (tenant, service, instance_key)
  string service = 2;
  string instance_key = 3;
  uint64 logical_time_ms = 4;
  ProcessEventPayload payload = 5;
  ModelRef model_ref = 6;       // start only
  ProcessKind kind = 7;         // start only
  ParentLink parent_link = 8;   // start only, when this instance is a child
}

// ProcessEventPayload is the per-turn input. `external` carries an opaque iflow
// EngineEvent (start vars / an externally-injected message) — reflow never
// parses it; only procSession decodes it. The other arms are reflow-native
// feedback the apply path synthesizes when a dispatched task / timer / child
// completes; procSession translates them into the iflow EngineEvent the engine
// expects. Reused by ProcessInboxEntry so the inbox stores a turn verbatim.
message ProcessEventPayload {
  oneof of {
    bytes external = 1;
    ProcessTaskCompleted task_completed = 2;
    ProcessTimerFired timer_fired = 3;
    ProcessChildCompleted child_completed = 4;
    ProcessMessageReceived message_received = 5;
  }
}

// ProcessTaskCompleted feeds a dispatched service task's result back to the
// node that spawned it (TaskInvoke → ActInvoke → invocation terminal →
// applyTerminalCompletion's process_parent branch).
message ProcessTaskCompleted {
  string node_id = 1;
  string instance_idx = 2;
  bytes output = 3;
  bool failed = 4;
  string failure_message = 5;
}

// ProcessTimerFired feeds an armed process timer back (TimerArm → TimerService
// → Command_ProcessEvent). node_id + slot identify the timer element.
message ProcessTimerFired {
  string node_id = 1;
  uint32 slot = 2;
}

// ProcessChildCompleted feeds a child process/case instance's terminal result
// back to the call-activity / case-task node that started it (ChildStart →
// child instance terminal → onProcessAdvanced terminal delivery).
message ProcessChildCompleted {
  string node_id = 1;
  string instance_idx = 2;
  bytes output = 3;
  bool failed = 4;
  string failure_message = 5;
}

// ProcessMessageReceived feeds a correlated inbound message back to a parked
// node — a BPMN message/signal catch that emitted SignalSubscribe. The read
// path (onDeliverProcessMessage) stamps node_id from the matched
// MessageSubscription; procSession turns it into the iflow resume event
// (bpmn.SignalReceived{NodeID, Payload}). payload is the message body, a JSON
// object of variables merged into the instance.
message ProcessMessageReceived {
  string node_id = 1;
  string message_name = 2;
  string correlation_key = 3;
  bytes payload = 4;
}

// TimerValue is the stored value of a TimerTable row. A plain sleep / run-retry
// timer carries sleep_idx (the originating JESleep/JERun journal index); a
// process timer carries `process` instead, so the TimerService fires it as a
// Command_ProcessEvent rather than a Command_TimerFired. Exactly one is set.
message TimerValue {
  uint32 sleep_idx = 1;
  ProcessTimer process = 2;
}

// ProcessTimer is the process-timer descriptor stored in TimerValue.process.
// The timer's InvocationId carries pk (→ shard) + a synthetic uuid derived from
// (service, instance_key, node_id, slot); this descriptor recovers the
// addressing the TimerService needs to build the fired ProcessEvent.
message ProcessTimer {
  string service = 1;
  string instance_key = 2;
  string node_id = 3;
  uint32 slot = 4;
}

// ProcessAdvanced is the leader-only result of one Advance, proposed by
// procSession via ProposeSelf. new_state is the opaque next iflow blob; the
// instruction lists are reflow-native (procSession already translated the
// iflow Commands), so the apply arm just writes new_state and turns each
// instruction into an Action.
message ProcessAdvanced {
  fixed64 pk = 1;
  string service = 2;
  string instance_key = 3;
  bytes new_state = 4;
  repeated TaskInvoke invoke = 5;        // -> ActInvoke (a ctx.Call to a capability handler)
  repeated TimerArm arm_timer = 6;       // -> ActRegisterTimer
  repeated TimerCancel cancel_timer = 7; // -> ActDeleteTimer
  repeated ChildStart start_child = 8;   // -> ActDispatchOutbox (subprocess / call-activity / case-task)
  repeated SignalSubscribe subscribe = 9;
  ProcessTerminal terminal = 10;             // set iff ProcessCompleted / ProcessFailed
  repeated SignalUnsubscribe unsubscribe = 11; // -> delete MessageSubscription (torn-down catch)
}

message TaskInvoke {
  string node_id = 1;          // BPMN node / CMMN plan item the result correlates back to
  string instance_idx = 2;     // non-empty for multi-instance
  InvocationTarget target = 3; // resolved capability handler
  bytes input = 4;             // marshaled task inputs
}
message TimerArm { string node_id = 1; uint64 fire_at_ms = 2; uint32 slot = 3; }
message TimerCancel { string node_id = 1; uint32 slot = 2; }
message ChildStart {
  string node_id = 1;
  ModelRef model_ref = 2;
  ProcessKind kind = 3;
  string instance_key = 4;
  bytes vars = 5;
}
message SignalSubscribe { string node_id = 1; string message_name = 2; string correlation_key = 3; }
// SignalUnsubscribe tears down a parked catch (event-gateway loser, or any catch
// torn down while still subscribed). Carries only the catch node id — the engine
// recovers the correlation from the per-instance proc_sub_idx reverse index (the
// adapter's CancelWait has no correlation key; see iflow host.Correlation).
message SignalUnsubscribe { string node_id = 1; }

// ProcessTerminal ends an instance. retention_ms is the model-declared history
// window (the Camunda historyTimeToLive analog), stamped by the iflow adapter:
// 0 = no retention (finishProcessInstance deletes the record immediately on
// terminal, as before — observable only via the result delivered to a parent);
// >0 retains the terminal record for the window, after which the leader's
// process reaper deletes it. The window is opt-in and shares the reap mechanism
// with invocation/workflow retention.
message ProcessTerminal {
  bool failed = 1;
  bytes output = 2;
  string failure_message = 3;
  uint64 retention_ms = 4;
}

// ReapProcessInstance deletes a terminal process instance's retained record and
// any leftover rows after its history window (ProcessTerminal.retention_ms)
// elapses — the process-plane analog of ReapInvocation. Proposed only by the
// leader's process reaper (the generalized ReapService bound to
// ProcessReapTable); idempotent — the originating
// proc_reap/<fire_at><pk><digest> row is deleted in the same batch even on a
// no-op apply. pk/service/instance_key address the record; fire_at_ms
// identifies the reap row.
message ReapProcessInstance {
  fixed64 pk = 1;
  string service = 2;
  string instance_key = 3;
  fixed64 fire_at_ms = 4;
}

// MessageSubscription is one parked BPMN message/signal catch, stored in
// MessageSubscriptionTable on the partition owning (tenant, message_name,
// correlation_key) — which generally differs from the instance's own partition,
// so actuateProcessInstructions writes it cross-shard via
// OutboxEnvelope.process_subscribe. instance_pk/service/instance_key address the
// parked instance; node_id is the waiting node the delivery resumes.
message MessageSubscription {
  fixed64 instance_pk = 1;
  string service = 2;
  string instance_key = 3;
  string node_id = 4;
  string message_name = 5;
  string correlation_key = 6;
}

// ProcessSubscribe carries one MessageSubscription to the partition that owns the
// message routing key (pk = banded PartitionKey(tenant, message_name,
// correlation_key)). Applied via Command_ProcessSubscribe (onProcessSubscribe
// writes the row); shipped cross-shard via OutboxEnvelope.process_subscribe.
message ProcessSubscribe {
  fixed64 pk = 1;
  MessageSubscription sub = 2;
}

// ProcessUnsubscribe deletes one MessageSubscription from the partition owning
// the message routing key — the teardown counterpart of ProcessSubscribe.
// Applied via Command_ProcessUnsubscribe (onProcessUnsubscribe deletes the row);
// shipped cross-shard via OutboxEnvelope.process_unsubscribe. It carries the full
// subscription (not just a correlation) so the apply arm reconstructs the forward
// row key exactly; the engine builds it from the proc_sub_idx reverse index.
message ProcessUnsubscribe {
  fixed64 pk = 1;
  MessageSubscription sub = 2;
}

// DeliverProcessMessage is the inbound-correlation command. It lands on the
// partition owning pk = banded PartitionKey(tenant, message_name,
// correlation_key), scans every matching MessageSubscription, fans a
// ProcessMessageReceived out to each parked instance, and one-shot-deletes the
// rows (so redelivery is naturally idempotent). A message with no current
// subscriber is dropped, not buffered — matching BPMN signal semantics.
message DeliverProcessMessage {
  fixed64 pk = 1;
  string message_name = 2;
  string correlation_key = 3;
  bytes payload = 4;
  uint64 logical_time_ms = 5;
}

// ProcessInstanceRecord is the stored value of ProcessInstanceTable
// (proc/<lp:4><service>/<instance_key>).
message ProcessInstanceRecord {
  InvocationId root_id = 1;     // stable handle for id-keyed timer / dedup rows
  ModelRef model_ref = 2;       // pinned at start — version-skew safe
  ProcessKind kind = 3;
  bytes state_blob = 4;         // opaque iflow ExecutionState / CaseState
  ProcessStatus status = 5;
  ParentLink parent_link = 6;   // set if this instance is a child
  // Inbox cursor for single-writer turn serialization. Events are appended to
  // ProcessInboxTable at next_seq (then next_seq is bumped); active_seq is the
  // seq of the turn in flight (0 = idle). Exactly one turn runs at a time: the
  // ProcessAdvanced apply arm dequeues active_seq and activates active_seq+1
  // when it exists. Seqs are 1-based so 0 is an unambiguous "idle".
  uint64 next_seq = 7;
  uint64 active_seq = 8;
  // outstanding counts dispatched work awaiting a feedback event — service-task
  // invokes, child-process starts, and armed timers. The inbox cursor cannot see
  // it: next_seq-1-active_seq is only queued events, whereas dispatched work has
  // left the instance and not yet returned. outstanding==0 with active_seq==0 and
  // an empty inbox (next_seq==active_seq+1) is the unambiguous "genuinely
  // quiescent — parked on an external message/signal" signal, as opposed to a
  // turn mid-dispatch. Maintained on the apply path; feedback decrements saturate
  // at 0 to absorb the benign timer fire-vs-cancel race.
  uint32 outstanding = 9;
  // Terminal / history fields. finishProcessInstance stamps output,
  // failure_message, and ended_at_ms when a turn ends the instance and (when
  // ProcessTerminal.retention_ms > 0) retains the record for the window before
  // the process reaper deletes it. output/failure_message mirror the terminal
  // turn's ProcessTerminal; created_at_ms is stamped at record creation so the
  // pair brackets the instance lifetime for the history/query surface.
  bytes output = 10;
  string failure_message = 11;
  uint64 created_at_ms = 12;
  uint64 ended_at_ms = 13;
}

// ProcessInboxEntry is one queued event for an instance, stored at
// proc_inbox/<lp:4><service>/<instance_key>/<seq:8>. It holds everything needed
// to (re-)drive the turn after a leader change: the verbatim turn payload and
// the stamped logical time the procSession feeds to the engine clock.
message ProcessInboxEntry {
  ProcessEventPayload payload = 1;
  uint64 logical_time_ms = 2;
}

// ModelRef pins one iflow model snapshot (iflow/modelstore.ModelRef).
message ModelRef {
  string kind = 1;
  string name = 2;
  string version = 3;
}

enum ProcessKind {
  PROCESS_KIND_UNSPECIFIED = 0;
  PROCESS_KIND_BPMN = 1;
  PROCESS_KIND_CMMN = 2;
}

enum ProcessStatus {
  PROCESS_STATUS_UNSPECIFIED = 0;
  PROCESS_STATUS_RUNNING = 1;
  PROCESS_STATUS_COMPLETED = 2;
  PROCESS_STATUS_FAILED = 3;
}

// SnapshotMeta is the operator-visible sidecar accompanying each snapshot
// blob in the SnapshotRepository. Marshaled as protojson so `cat` / `jq`
// work on the artifact:
//
//   {prefix}/p{shard_id:08d}/snapshot-{raft_index:020d}.tar
//   {prefix}/p{shard_id:08d}/snapshot-{raft_index:020d}.meta.json
//
// See SAD §6.12.
message SnapshotMeta {
  uint64 shard_id = 1;
  uint64 raft_index = 2;
  uint64 leader_epoch = 3;
  string reflow_version = 4;
  // Hex-encoded SHA-256 of the snapshot tar body.
  string checksum_sha256 = 5;
  fixed64 created_at_ms = 6;
}

// NodeHostMeta is the payload packed into dragonboat's GossipConfig.Meta
// blob. Every NodeHost advertises it via gossip; peers retrieve it via
// INodeHostRegistry.GetMeta(nodeHostID) and use it to dial the reflow
// gRPC Delivery service for cross-partition outbox dispatch and the
// reflow Admin service for SelfJoin / LeaderHint redirects.
message NodeHostMeta {
  string grpc_endpoint = 1;
  // Admin Connect endpoint advertised so peers (joiners running
  // SelfJoin and the `reflowd cluster ...` CLI following LeaderHint
  // redirects) can discover the metadata leader's admin port via
  // gossip rather than requiring it preconfigured.
  string admin_endpoint = 2;
}

// DeploymentRecord is the persisted shape of a registered deployment in
// shard 0's DeploymentTable. One row per (id) with the URL the operator
// handed in, plus the handler set discovered at registration time.
//
// Pinning: every Invocation row carries a deployment_id stamped at
// submit time so replays route to the same deployment even when newer
// deployments for the same (service, handler) have since landed. We
// never garbage-collect deployment rows on overwrite; superseded rows
// stay readable until every invocation referencing them has terminated
// (GC is a future feature; ref-counting against InvocationStatus).
//
// Only "http://" and "https://" URLs are accepted; the engine-side
// handlerclient dispatches over raw HTTP/2.
message DeploymentRecord {
  string id = 1;
  string url = 2;
  // handlers enumerates every (service, handler, kind) tuple the
  // deployment claimed at discovery time. Used by the engine-side
  // routing table to map (service, handler) → deployment_id when an
  // invocation arrives without an operator-supplied pin.
  repeated DeploymentHandler handlers = 4;
  fixed64 registered_at_ms = 5;
  // Per-invocation cap on journal entries (steps). 0 = engine default
  // (10_000). The engine clamps to a hard ceiling (100_000) so an
  // operator misconfig can't request unbounded — runaway handlers on
  // keyed virtual objects would poison the VO queue indefinitely.
  uint32 max_journal_entries = 6;
  // Per-deployment retention windows (ms) before a Completed invocation's
  // durable rows are reaped. 0 = engine default (24h invocations /
  // 7d workflows). The engine clamps to a hard ceiling (365d). The
  // invoker stamps the resolved windows onto InvocationCompleted so the
  // partition apply path — which can't read this shard-0 row — picks the
  // right window per completion.
  uint64 invocation_retention_ms = 7;
  uint64 workflow_retention_ms = 8;
}

// DeploymentHandler is one (service, handler, kind) entry in a
// DeploymentRecord. kind matches sdk.Kind / protocolv1.Kind:
//   0 unspecified, 1 service, 2 object, 3 workflow.
message DeploymentHandler {
  string service = 1;
  string handler = 2;
  uint32 kind = 3;
}

// RegisterDeployment is the Command_RegisterDeployment payload. Proposed
// by the Config RegisterDeployment RPC after a successful discovery
// probe against the handler URL. Apply arm CAS-checks
// Envelope.precondition, writes DeploymentTable[record.id] = record,
// maintains DeploymentIndexTable per (service, handler), and bumps
// RevisionTableDeployment.
message RegisterDeployment {
  DeploymentRecord record = 1;
}

// DeleteDeployment is the Command_DeleteDeployment payload. Apply arm
// CAS-checks Envelope.precondition, loads the existing record (so it
// can enumerate the (service, handler) entries to evict), removes the
// DeploymentTable row, evicts DeploymentIndexTable rows that still
// pointed to this id, and bumps RevisionTableDeployment. Delete-of-
// absent still bumps the revision (the operator-visible "proposal
// landed" signal).
message DeleteDeployment {
  string id = 1;
}

// PlatformConfigRecord is shard 0's cluster-wide platform-config singleton
// (one row). It carries fleet policy every node reconciles locally. v1 holds
// only the Cedar cluster authz policy text; the other platform knobs from SAD
// §6.15.2 (listener behavior, PKI mode, KMS enablement, audit retention,
// default tenant quotas) slot in as added fields here, no new table needed.
message PlatformConfigRecord {
  string cluster_authz_policy_text = 1;
}

// UpsertPlatformConfig is the Command_UpsertPlatformConfig payload — the full
// PlatformConfigRecord singleton (last-writer-wins under CAS).
message UpsertPlatformConfig {
  PlatformConfigRecord record = 1;
}

// SecretRecord is the persisted shape of one named secret in shard 0's
// SecretTable. The plaintext itself is never a field — Raft snapshots
// and commit logs would leak it. Each SecretRecord carries a pointer
// to where the ciphertext lives (gocloud.dev/blob URI) and which KEK
// can decrypt it (Tink KMS URI). The same record is referenced by
// `secret_name` from WebhookSourceRecord (and future consumers:
// event-source vendor credentials, outbound HMAC signing keys,
// OIDC client secrets, …) so define-once, reference-many.
//
// Per-node internal/secretstore Reconcilers fetch the blob, dispatch
// the KEK URI to registry.GetKMSClient, and call
// tink.AEAD.Decrypt(ciphertext, aad=secret.name). AAD = secret.name
// binds the ciphertext to the row identity, not to the consumer —
// renaming a secret is a re-encrypt operation (by design); renaming
// a webhook that references it is not.
//
// `remote_encrypted` is the only source shape today; the oneof leaves
// room for future shapes (e.g. inline-hybrid, vault-kv-path) without
// disturbing existing rows.
message SecretRecord {
  string name = 1;
  oneof source {
    RemoteEncryptedSecret remote_encrypted = 2;
  }
}

// RemoteEncryptedSecret stores ciphertext in any gocloud.dev/blob backend
// with the KEK held by a Tink-registered KMS. Reflow ships four KMS
// providers in-binary: BlobKMS (blobkms+<gocloud-uri> — the no-managed-
// KMS fallback), AWS KMS (aws-kms://...), GCP Cloud KMS (gcp-kms://...),
// and HashiCorp Vault Transit (hcvault://...). The first three self-
// register via init(); Vault is opt-in via cfg.KMS.Vault.TokenFile.
// Operators wiring additional providers register from main() before
// reflow.Run.
message RemoteEncryptedSecret {
  // gocloud.dev/blob URI: s3://bucket/key, gs://..., azblob://...,
  // file:///abs/path, mem://test/key.
  string blob_uri = 1;
  // Tink KMS URI: blobkms+<gocloud-uri>, aws-kms://..., gcp-kms://...,
  // hcvault://... — dispatched by registry.GetKMSClient.
  string kek_uri = 2;
}

// UpsertSecret is the Command_UpsertSecret payload. Apply arm CAS-
// checks Envelope.precondition, writes SecretTable[record.name] = record,
// bumps the table revision, and fires the SecretTable notifier so each
// node's local SecretStore Reconciler wakes and re-resolves.
message UpsertSecret {
  SecretRecord record = 1;
}

// DeleteSecret is the Command_DeleteSecret payload. Same CAS + notifier
// semantics as Upsert. Delete-of-absent is a no-op (the revision still
// bumps). Reflow does NOT cascade-validate consumer references: deleting
// a secret that webhook (or future) records still reference will surface
// as a resolve failure on the next reconcile, which the consumer's
// preserve-prev-on-error semantics handle gracefully — operators see a
// metric and clean up by deleting the consumer rows next.
message DeleteSecret {
  string name = 1;
}

// ModelRecord is the persisted shape of one BPMN/CMMN model definition in
// shard 0's ModelTable, keyed by model_ref (kind+name+version — an immutable
// snapshot id). The XML source is inlined: models are KB-scale artifacts (like
// a deployment discovery manifest), so a blob pointer isn't warranted. Per-node
// iflowengine TableResolvers reconcile each row into a parsed graph/case plus a
// resolved historyTimeToLive on each ModelTable notifier wake.
message ModelRecord {
  ModelRef model_ref = 1;
  bytes xml = 2;
  fixed64 registered_at_ms = 3;
}

// UpsertModel is the Command_UpsertModel payload. Apply arm CAS-checks
// Envelope.precondition, writes ModelTable[model_ref] = record, bumps
// RevisionTableModel, and fires the ModelTable notifier so each node's
// TableResolver wakes and re-parses. Accepted only by shardID=0.
message UpsertModel {
  ModelRecord record = 1;
}

// DeleteModel is the Command_DeleteModel payload. Same CAS + notifier
// semantics as Upsert. Delete-of-absent is a no-op (the revision still bumps).
// A model with live instances isn't cascade-checked here; an in-flight instance
// pins its model_ref, so a delete surfaces as a resolve failure on its next
// turn (failing just that instance).
message DeleteModel {
  ModelRef model_ref = 1;
}

// CARootRecord is the persisted shape of one cluster CA root in shard
// 0's CARootTable. The row carries the CA cert (PEM) plus a pointer
// into SecretTable holding the AEAD-wrapped signing key — the key
// never traverses Raft. `name` is the row's identity (e.g. "active");
// `rotation_epoch` is monotonic across rotations so a future rotation
// PR can keep older rows around for trust-bundle inclusion without
// breaking the active-CA lookup. `fingerprint` is sha256:<hex> over
// the cert's RawSubjectPublicKeyInfo and is the trust-anchor pin
// joiners verify against (matches creds.SPKIFingerprint).
message CARootRecord {
  string name = 1;
  bytes cert_pem = 2;
  string key_secret_name = 3;
  string fingerprint = 4;
  uint32 rotation_epoch = 5;
  fixed64 created_at_ms = 6;
}

// UpsertCARoot is the Command_UpsertCARoot payload. Apply arm CAS-
// checks Envelope.precondition, writes CARootTable[record.name] =
// record, bumps the table revision, and fires the CARootTable notifier
// so each node's local certmgr.ClusterIssuer wakes and re-resolves.
message UpsertCARoot {
  CARootRecord record = 1;
}

// DeleteCARoot is the Command_DeleteCARoot payload. Same CAS + notifier
// semantics as Upsert. Delete-of-absent is a no-op. Deleting the
// active CA row will break leaf issuance on the next renewal until a
// new row is written; consumers (the ClusterIssuer) preserve their
// in-memory active CA on resolve error.
message DeleteCARoot {
  string name = 1;
}

// JoinTokenKind tags how the token can be redeemed at MeshSign time.
// Node tokens authorize a `node/<N>` CN; operator tokens authorize an
// `operator/<name>` CN. The bootstrap server refuses to sign a CSR
// whose CN prefix doesn't match the redeeming token's kind.
enum JoinTokenKind {
  JOIN_TOKEN_KIND_UNSPECIFIED = 0;
  JOIN_TOKEN_KIND_NODE = 1;
  JOIN_TOKEN_KIND_OPERATOR = 2;
}

// JoinTokenRecord is the persisted shape of one bootstrap token in shard
// 0's JoinTokenTable. token_hash is sha256(token_plaintext); the
// plaintext is shown exactly once at create-time and never persisted.
// single_use=true (the default for `reflowd config create-join-token`)
// means the row carries `used=true` after the first MeshSign redemption,
// and any subsequent redemption attempt fails CAS at the FSM apply path
// and returns PermissionDenied. expiry_ms is wall-clock; the apply path
// reads it from Envelope.header.created_at_ms so partition-clock skew
// can't extend a token. requested_name is the CN-name segment the
// operator intends; on redemption the bootstrap server stamps CN =
// "<kind>/<requested_name>". For node tokens with requested_name="auto",
// the bootstrap server assigns the next free node_id from the cluster
// state at redemption time.
message JoinTokenRecord {
  bytes token_hash = 1;
  JoinTokenKind kind = 2;
  string requested_name = 3;
  fixed64 expiry_ms = 4;
  bool single_use = 5;
  bool used = 6;
  string created_by = 7;
  fixed64 created_at_ms = 8;
}

// UpsertJoinToken is the Command_UpsertJoinToken payload. Apply arm
// CAS-checks Envelope.precondition, writes JoinTokenTable[record.token_hash]
// = record, bumps the table revision. No notifier — the bootstrap server
// reads through the table on each MeshSign call (low volume). Operators
// create tokens via the admin RPC.
message UpsertJoinToken {
  JoinTokenRecord record = 1;
}

// ConsumeJoinToken atomically marks a single_use token as consumed.
// Apply arm CAS-checks if_table_revision_eq, then re-reads the row and
// rejects (via ResultValueFailedPrecondition) when used=true or expired.
// Otherwise writes record.used=true and bumps the revision. The
// bootstrap server proposes this command after validating the CSR's
// CN/kind alignment; only the apply arm decides whether the token can
// actually be spent.
message ConsumeJoinToken {
  bytes token_hash = 1;
}

// DeleteJoinToken removes the named row. Operator-initiated cleanup
// (the periodic expiry sweep landing in a later PR also routes through
// here). Delete-of-absent is a no-op. CAS semantics mirror Upsert.
message DeleteJoinToken {
  bytes token_hash = 1;
}

// LPOwnerRecord is the persisted shape of one (lp → shard_id) entry in
// shard 0's LPOwnersTable. lp is in [0, LPCount); shard_id is the
// 1-indexed partition-shard id that currently owns the LP. The set of
// 4096 rows is seeded at metadata-leader bootstrap by the consistent-
// hash planner (routing.NewPlanner; buraksezer/consistent + xxhash) —
// deterministic across leaders, bounded-load distribution across
// shards. PR 3 (transfer protocol) flips individual rows after data
// migration via UpsertLPOwner.
message LPOwnerRecord {
  uint32 lp = 1;
  uint64 shard_id = 2;
}

// UpsertLPOwner is the Command_UpsertLPOwner payload. Apply arm
// CAS-checks Envelope.precondition, writes
// LPOwnersTable[record.lp] = record, and bumps the table revision.
// Reserved for the future per-LP transfer protocol (PR 3) — PR 1/2
// callers use BulkUpsertLPOwners for the consistent-hash seed.
message UpsertLPOwner {
  LPOwnerRecord record = 1;
}

// DeleteLPOwner is the Command_DeleteLPOwner payload. Defensive; not
// used by PR 1 or PR 2. Same CAS + notifier semantics as Upsert.
message DeleteLPOwner {
  uint32 lp = 1;
}

// BulkUpsertLPOwners is the Command_BulkUpsertLPOwners payload. Apply arm
// CAS-checks Envelope.precondition, writes every record in one batch,
// and bumps the table revision exactly once. Used by the metadata-leader
// bootstrap to seed all 4096 rows in a single Raft entry (~100 KB,
// well under the entry-size budget). One notifier fan-out covers the
// whole batch.
message BulkUpsertLPOwners {
  repeated LPOwnerRecord records = 1;
}

// RegisterNode is proposed against shard 0 when a reflowd process starts
// and wants to publish or refresh its membership record.
// the static peer list is identical on every node so the proposal is
// idempotent; the apply arm updates last_seen_ms.
message RegisterNode {
  NodeMembership member = 1;
}

// UpdatePartitionTable replaces shard 0's partition table atomically.
// The new leader of shard 0 proposes this once at bootstrap with the
// initial replica assignment derived from the peer set.
// assignment_epoch is incremented on every successful apply; consumers
// fence stale local caches against it.
message UpdatePartitionTable {
  PartitionTable table = 1;
}

// NodeMembership is the per-node record kept in shard 0's state.
// raft_addr is dragonboat's inter-node transport address. node_host_id
// is the stable identifier published over gossip; routing translates
// node_id → node_host_id → gRPC endpoint via the gossip Meta payload.
// last_seen_ms is updated by RegisterNode applies.
message NodeMembership {
  uint64 node_id = 1;
  string raft_addr = 2;
  string node_host_id = 3;
  int64 last_seen_ms = 4;
}

// PartitionTable is shard 0's authoritative map of partition shards to
// replica node sets. Persisted via UpdatePartitionTable. The number of
// partition shards (the routing modulus) is independent of peer count;
// the bootstrap path populates every partition_shard_id 1..N with the
// configured replica set.
message PartitionTable {
  map<uint64, ReplicaSet> shards = 1;
  uint64 assignment_epoch = 2;
  // pending holds in-flight rebalance steps committed by
  // BeginRebalanceStep but not yet CompleteRebalanceStep'd. A new
  // metadata-leader picks up where the previous one left off by
  // replaying this list against dragonboat.
  repeated RebalanceStep pending = 3;
  // meta_replicas is the voting member set of shard 0 (the metadata
  // Raft group itself). Modeled alongside `shards` so the rebalance
  // pipeline can carry shard-0 membership changes uniformly — the
  // admin AddNode workflow enqueues a BeginRebalanceStep{shard_id=0}
  // for the joiner; failure-detector EvictNode appends a
  // DELETE_REPLICA{shard_id=0} when the evicted node is a metadata
  // voter. `assignment_epoch` is NOT bumped on shard-0 changes —
  // routing decisions don't depend on metadata-shard membership.
  ReplicaSet meta_replicas = 4;
}

// ReplicaSet is the per-partition replica list. Order is not significant
// for correctness; dragonboat treats the membership as a set.
message ReplicaSet {
  repeated uint64 node_ids = 1;
}

// EvictNode marks a node logically dead in shard 0. The apply arm
// zeroes the matching NodeMembership.last_seen_ms and enqueues
// BeginRebalanceStep entries for every partition the evicted node
// previously hosted. Idempotent: re-applying for an already-evicted
// node is a no-op.
message EvictNode {
  uint64 node_id = 1;
}

// RebalanceStep is a single dragonboat membership-change action,
// scoped to one partition shard. Sequences are persisted in
// PartitionTable.pending so a leader failover can resume mid-flight.
// step_id is monotonic per shard_id and acts as the idempotency token
// — the rebalancer matches dragonboat results back to the originating
// step regardless of retries.
message RebalanceStep {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    ADD_NON_VOTING = 1;
    PROMOTE_TO_VOTER = 2;
    DELETE_REPLICA = 3;
  }
  uint64 shard_id = 1;
  Kind kind = 2;
  // add_node_id is the node being added (ADD_NON_VOTING, PROMOTE_TO_VOTER).
  uint64 add_node_id = 3;
  // remove_node_id is the node being removed (DELETE_REPLICA).
  uint64 remove_node_id = 4;
  // step_id is the monotonic idempotency token, scoped to shard_id.
  uint64 step_id = 5;
}

// BeginRebalanceStep appends a RebalanceStep to PartitionTable.pending
// if no entry with the same (shard_id, step_id) already exists.
// Proposed by the admin handler (after AddNode / EvictNode applies)
// and re-proposed on retry; the apply path absorbs duplicates.
message BeginRebalanceStep {
  RebalanceStep step = 1;
}

// CompleteRebalanceStep removes the matching entry from
// PartitionTable.pending, bumps assignment_epoch, and (for
// DELETE_REPLICA) updates ReplicaSet.node_ids. Proposed by the
// rebalancer after dragonboat acknowledges the corresponding
// SyncRequest*.
message CompleteRebalanceStep {
  uint64 shard_id = 1;
  uint64 step_id = 2;
}

// LPTransferPhase tracks the saga state of an in-progress LP transfer.
// Each transition is itself a Raft-committed UpdateLPTransferPhase on
// shard 0, so a metadata-leader change resumes from the last persisted
// phase.
enum LPTransferPhase {
  LP_TRANSFER_PHASE_UNSPECIFIED = 0;
  // INIT: row written by Admin/TransferLP. lpMover next sends
  // BeginLPTransfer to the source.
  LP_TRANSFER_PHASE_INIT = 1;
  // SHIPPING: source has accepted the freeze and is shipping SSTs
  // to the destination. The source emits a phase=SHIPPING ack after
  // its outbox drain completes.
  LP_TRANSFER_PHASE_SHIPPING = 2;
  // STAGED: destination has applied the is_final SST. lpMover next
  // proposes UpsertLPOwner with the recorded expected_lpowners_revision
  // CAS.
  LP_TRANSFER_PHASE_STAGED = 3;
  // FLIPPED: LPOwnersTable[lp] has been atomically updated to point at
  // the destination. lpMover next sends FinishLPTransfer to source and
  // CommitLPTransfer to destination.
  LP_TRANSFER_PHASE_FLIPPED = 4;
  // CLEANED: source has range-deleted the LP keyspace and dropped its
  // freeze row; destination has dropped its staging row. The transfer
  // is complete; the row is kept briefly for operator visibility, then
  // RemoveLPTransfer'd.
  LP_TRANSFER_PHASE_CLEANED = 5;
  // ABORTING: transfer is being rolled back (CAS conflict, stall, or
  // operator-requested abort). lpMover fans out AbortLPTransfer to both
  // partition sides.
  LP_TRANSFER_PHASE_ABORTING = 6;
  // ABORTED: both sides have rolled back. The row is kept briefly for
  // operator visibility, then RemoveLPTransfer'd.
  LP_TRANSFER_PHASE_ABORTED = 7;
}

// LPTransferRecord is the persisted shape of one in-progress (or
// recently-completed) LP transfer, kept in shard 0's LPTransferTable
// keyed by transfer_id. The lpMover ticks against this table and
// advances each non-terminal row by composing CrossShardSender sends
// and CAS proposals back to shard 0.
//
// expected_lpowners_revision is captured at InitiateLPTransfer and
// used as the if_table_revision_eq guard on the final UpsertLPOwner
// CAS. If the LPOwnersTable revision drifts between INIT and STAGED
// the transfer transitions to ABORTING.
message LPTransferRecord {
  string transfer_id = 1;
  uint32 lp = 2;
  uint64 source_shard = 3;
  uint64 dest_shard = 4;
  LPTransferPhase phase = 5;
  fixed64 started_at_ms = 6;
  fixed64 last_event_ms = 7;
  uint64 expected_lpowners_revision = 8;
}

// InitiateLPTransfer is the Command_InitiateLPTransfer payload. Apply
// arm validates lp < LPCount, dest_shard ∈ PartitionTable.Shards,
// rejects if any non-terminal transfer for the same lp already exists,
// resolves source_shard from LPOwnersTable, and writes the record at
// PHASE_INIT with the current LPOwnersTable revision captured as
// expected_lpowners_revision.
message InitiateLPTransfer {
  string transfer_id = 1;
  uint32 lp = 2;
  uint64 dest_shard = 3;
}

// UpdateLPTransferPhase advances one LPTransferRecord one phase.
// Proposed by the lpMover after a side-effect (cross-shard send,
// CAS, etc.) has completed; CAS-checks
// Envelope.precondition.if_table_revision_eq against
// RevisionTableLPTransfers so concurrent lpMovers on leadership
// flips never double-advance.
message UpdateLPTransferPhase {
  string transfer_id = 1;
  LPTransferPhase phase = 2;
  // expected_lpowners_revision is re-stamped on FLIPPED only (so a
  // resumed lpMover after FLIPPED knows the revision to start any
  // follow-on CAS against). Zero on other transitions.
  uint64 expected_lpowners_revision = 3;
}

// RemoveLPTransfer drops a CLEANED or ABORTED row after the operator-
// visibility grace window (~1 min). Defensive — duplicate calls are
// no-ops.
message RemoveLPTransfer {
  string transfer_id = 1;
}

// SetRebalanceDrain is the Command_SetRebalanceDrain payload. Single
// command shape covers both add and remove via the drain bool — keeps
// the wire format compact and the apply arm symmetric. shard_id is the
// partition shard id (≥ 1); shard 0 is the metadata group and is never
// drained via this command.
message SetRebalanceDrain {
  uint64 shard_id = 1;
  bool drain = 2;
}

// RebalanceDrainRecord is the on-disk row persisted under
// rebalance_drain/<8-byte BE shard_id> by the SetRebalanceDrain apply
// arm. added_at_ms is sourced from Envelope.header.created_at_ms so the
// row's timestamp is deterministic across replicas.
message RebalanceDrainRecord {
  uint64 shard_id = 1;
  fixed64 added_at_ms = 2;
}

// BeginLPTransfer is sent by the lpMover to the source partition shard.
// Apply arm installs LPFreezeTable[lp] = {transfer_id, dest_shard,
// frozen_at_ms} so every subsequent LP-touching command on this shard
// returns ResultValueLPFrozen, and emits an ActStartLPTransferScan
// action for the leader-side LPTransferSourceService.
message BeginLPTransfer {
  string transfer_id = 1;
  uint32 lp = 2;
  uint64 dest_shard = 3;
}

// ApplyLPTransferSST is sent by the source's LPTransferSourceService
// to the destination partition shard, AFTER the source has uploaded
// the referenced SST files over the delivery listener's
// UploadLPTransferSST RPC. Apply arm validates
// sst_seq == staging.next_sst_seq (silently drops duplicates, which
// the source uses for retry — source Rebuild always restarts at 0),
// resolves each TransferSSTRef.relative_path against
// `<dataDir>.lpstage_in/<transfer_id>/`, calls pebble.DB.Ingest with
// the path set, and bumps next_sst_seq. On is_final=true the apply
// arm emits ActSignalLPTransferStaged so the runner routes a phase
// ack back to shard 0.
//
// The dest's LP keyspace is empty before the LPOwnersTable flip, so
// plain Ingest (not IngestAndExcise) suffices: there is no existing
// data to atomically replace.
message ApplyLPTransferSST {
  string transfer_id = 1;
  uint32 lp = 2;
  uint64 source_shard = 3;
  uint64 sst_seq = 4;
  repeated TransferSSTRef ssts = 5;
  bool is_final = 6;
}

// TransferSSTRef is one SST file the dest must Ingest. relative_path
// is rooted at `<dataDir>.lpstage_in/<transfer_id>/` on the dest;
// absolute resolution is the dest's responsibility (source-supplied
// absolute paths would be a confused-deputy risk). smallest_user_key
// and largest_user_key let the dest do a cheap bounds sanity check
// before opening the file; size_bytes and sha256_hex are observability
// + integrity belts.
message TransferSSTRef {
  string relative_path = 1;
  uint64 size_bytes = 2;
  string sha256_hex = 3;
  bytes smallest_user_key = 4;
  bytes largest_user_key = 5;
}

// CommitLPTransfer is sent by the lpMover to the destination after the
// LPOwnersTable flip succeeds. Apply arm drops the LPStagingTable row
// (the staged data was already ingested into the live LP namespaces
// by ApplyLPTransferSST).
message CommitLPTransfer {
  string transfer_id = 1;
  uint32 lp = 2;
}

// FinishLPTransfer is sent by the lpMover to the source after the
// LPOwnersTable flip succeeds. Apply arm walks timer_lp/<lp>/... first
// to collect the primary `timer/<fire>/<id>` keys (the primary
// keyspace is LP-agnostic on disk), deletes each, then DeleteRange's
// every LP-prefixed namespace using keys.<NS>LPPrefix(lp) +
// PrefixUpperBound. Drops the LPFreezeTable[lp] row and emits
// ActSignalLPTransferCleaned.
message FinishLPTransfer {
  string transfer_id = 1;
  uint32 lp = 2;
}

// AbortLPTransfer is sent by the lpMover to both partition sides when
// a transfer is rolled back. Source: drops LPFreezeTable[lp] row. Dest:
// DeleteRange's every LP-prefixed namespace (in case partial SST data
// landed) and drops LPStagingTable[transfer_id]. Both sides emit
// ActSignalLPTransferAbortAck.
message AbortLPTransfer {
  string transfer_id = 1;
  uint32 lp = 2;
}

// LPFreezeRow is the per-partition record installed by BeginLPTransfer
// (apply arm) and consumed by the freeze gate in partition.go before
// every LP-touching command. Persisted under
// `lp_freeze/<4-byte BE lp>` keys.
message LPFreezeRow {
  string transfer_id = 1;
  uint64 dest_shard = 2;
  fixed64 frozen_at_ms = 3;
}

// LPStagingRow is the per-destination-partition record used by
// ApplyLPTransferSST to enforce in-order SST delivery and absorb
// retries. Persisted under `lp_staging/<transfer_id>` keys. Dropped by
// CommitLPTransfer / AbortLPTransfer.
message LPStagingRow {
  string transfer_id = 1;
  uint32 lp = 2;
  uint64 source_shard = 3;
  uint64 next_sst_seq = 4;
  bool is_final_seen = 5;
}


