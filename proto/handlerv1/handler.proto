// Reflow handler service v1 — engine ↔ handler RPC surface.
//
// The transport is Connect RPC. Engine and handler both support the
// Connect / gRPC / gRPC-Web protocols on the same endpoint; the engine
// dials whichever the handler advertises. Capability discovery lives in
// proto/discoveryv1.
//
// Invoke carries one full invocation session as a unary request/response.
// The engine sends StartMessage + replay frames in InvokeRequest.frames;
// the handler runs to suspension or completion and returns its new command
// frames + the terminal Output/Suspension/Error frame in InvokeResponse.frames.
// The session is half-duplex — the engine never sends mid-session, and
// every await resolves via suspend→respawn (a fresh session with a larger
// replay buffer) — so a unary shape is sufficient; the engine→handler call
// needs no streaming. Route info (service + handler) rides inside the
// StartMessage frame — no URL/header metadata is consulted on the server.
//
// Wire framing of protocolv1.Frame is unchanged: the 8-byte header +
// payload bytes live inside Frame.header and Frame.payload.
syntax = "proto3";

package reflow.handler.v1;

import "protocolv1/protocol.proto";

option go_package = "github.com/twinfer/reflw/proto/handlerv1;handlerv1";

service HandlerService {
  // Invoke runs one full invocation session. InvokeRequest.frames is the
  // StartMessage frame followed by one frame per known journal entry
  // (replay); InvokeResponse.frames is the handler's emitted command
  // frames followed by the terminal Output / Suspension / Error frame.
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
}

// InvokeRequest carries the StartMessage frame followed by the replay
// frames the engine ships to open a session.
message InvokeRequest {
  repeated reflow.protocol.v1.Frame frames = 1;
}

// InvokeResponse carries the command frames the handler emitted plus the
// terminal frame produced by one session run.
message InvokeResponse {
  repeated reflow.protocol.v1.Frame frames = 1;
}
