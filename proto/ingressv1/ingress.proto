// Reflow ingress service.
//
// Exposes the user-facing entrypoints for submitting invocations, awaiting
// their results, and resolving awakeables. Served over Connect (HTTP/2)
// with content-negotiated Connect / gRPC / gRPC-Web / HTTP-JSON; clients
// pick a wire encoding by setting Content-Type. The default reflowd
// config is single-partition (shard 1) but ingress is partition-agnostic
// and routes via Host.Partitioner.
syntax = "proto3";

package reflow.ingress.v1;

import "enginev1/engine.proto";

option go_package = "github.com/twinfer/reflow/proto/ingressv1;ingressv1";

service Ingress {
  // SubmitInvocation enqueues a new invocation. Returns the minted
  // invocation ID; the caller polls AwaitInvocation for the result.
  rpc SubmitInvocation(SubmitInvocationRequest) returns (SubmitInvocationResponse);

  // AwaitInvocation blocks (up to deadline) until the named invocation
  // reaches Completed and returns its output. Server-side polling of
  // SyncRead today; SSE/streaming is a future evolution.
  rpc AwaitInvocation(AwaitInvocationRequest) returns (AwaitInvocationResponse);

  // ResolveAwakeable completes an outstanding awakeable previously
  // created by a handler via ctx.Awakeable(). Routes to the owning
  // partition by looking up the awakeable directory.
  rpc ResolveAwakeable(ResolveAwakeableRequest) returns (ResolveAwakeableResponse);

  // DescribeInvocation returns the current status of an invocation
  // without blocking. Read-only debug endpoint.
  rpc DescribeInvocation(DescribeInvocationRequest) returns (DescribeInvocationResponse);

  // AttachInvocation blocks (up to deadline) on an existing invocation
  // and returns its outcome once Completed. Same shape as
  // AwaitInvocation but explicit about attaching to an already-
  // submitted invocation by id.
  rpc AttachInvocation(AttachInvocationRequest) returns (AttachInvocationResponse);

  // GetInvocationOutput is a non-blocking lookup of an invocation's
  // current outcome. Returns PENDING for still-running invocations,
  // COMPLETED_OK / COMPLETED_FAILED for terminated ones, UNKNOWN if no
  // such invocation is known to this node.
  rpc GetInvocationOutput(GetInvocationOutputRequest) returns (GetInvocationOutputResponse);

  // GetObjectState reads a single state value for a virtual object.
  // Routes to the partition owning the object by hashing (service,
  // object_key) through the cluster Partitioner. present=false (not an
  // error) when the key is absent.
  rpc GetObjectState(GetObjectStateRequest) returns (GetObjectStateResponse);

  // CancelInvocation forces a running invocation to terminate with
  // FailureCode=9002 (cancelled). Implemented as a __cancel__ signal
  // delivered to the invocation's (service, key); the receiver shard
  // resolves the active InvocationId via KeyLeaseTable and synthesizes
  // a terminal Completed. Idempotent: cancelling an already-completed
  // invocation is a no-op.
  rpc CancelInvocation(CancelInvocationRequest) returns (CancelInvocationResponse);

  // ResolveWorkflowPromise resolves or rejects a named workflow-scoped
  // durable promise. Routes by (service, workflow_key) via
  // Partitioner.ShardForTarget; the receiver shard writes PromiseValue
  // and wakes any in-flight Promise(name).Result() awaiter. Idempotent
  // against already-completed promises: succeeded=false signals
  // "promise already completed" without an error status.
  rpc ResolveWorkflowPromise(ResolveWorkflowPromiseRequest) returns (ResolveWorkflowPromiseResponse);

  // PurgeInvocation deletes a Completed invocation's durable rows (inv
  // status, journal, signal inbox/awaiter) immediately, instead of
  // waiting for the retention reaper. Routes by the partition_key encoded
  // in the invocation id. Idempotent and no-op-safe: purging an absent or
  // not-yet-Completed invocation is accepted but changes nothing (the
  // apply arm requires a Completed/Free → Free transition). Does not touch
  // virtual-object state or workflow promise rows.
  rpc PurgeInvocation(PurgeInvocationRequest) returns (PurgeInvocationResponse);

  // ListInvocations lists the caller tenant band's invocations, fanning out
  // across the shards owning the band's LPs (same substrate as
  // ListProcessInstances). Optional service-name and state filters; capped by
  // limit. Read-only — no proposal.
  rpc ListInvocations(ListInvocationsRequest) returns (ListInvocationsResponse);

  // StartProcess launches a new iflow BPMN/CMMN instance. Routes to the
  // partition owning (tenant, model name, instance_key) and proposes a start
  // ProcessEvent (model_ref + kind set). Idempotent per (model, instance_key):
  // a start for an already-existing instance is dropped by the apply path. When
  // instance_key is empty the server mints a random one (then not idempotent).
  rpc StartProcess(StartProcessRequest) returns (StartProcessResponse);

  // DeliverMessage correlates an inbound message/signal to parked process
  // instances. Routes to the partition owning (tenant, message_name,
  // correlation_key) and proposes DeliverProcessMessage, which fans the message
  // out to every instance subscribed on that (message_name, correlation_key).
  // An empty correlation_key addresses every instance waiting on the name (BPMN
  // signal broadcast). Messages with no current subscriber are dropped.
  rpc DeliverMessage(DeliverMessageRequest) returns (DeliverMessageResponse);

  // GetProcessInstance is a linearizable read of one instance's current state,
  // routed by (tenant, model name, instance_key) like StartProcess. It exists
  // so a caller without an await RPC can observe lifecycle: present=false means
  // the instance never started OR already reached a terminal and was reaped
  // (completion is immediate-reap, so a COMPLETED record never lingers);
  // present=true with active_seq>0 means a turn is in flight; present=true with
  // active_seq==0 means idle/parked on an external wait (a timer that will fire,
  // or a message/signal subscription). Read-only — no proposal.
  rpc GetProcessInstance(GetProcessInstanceRequest) returns (GetProcessInstanceResponse);
  // ListProcessInstances lists the caller tenant band's process instances,
  // fanning out across the shards owning the band's LPs. Optional model-name and
  // status filters; capped by limit.
  rpc ListProcessInstances(ListProcessInstancesRequest) returns (ListProcessInstancesResponse);
}

message SubmitInvocationRequest {
  string service = 1;
  string handler = 2;
  // Optional object key. Empty for unkeyed services.
  string object_key = 3;
  // Handler input bytes (JSON, proto, anything — the SDK opaquely
  // passes it through).
  bytes input = 4;
  // Optional idempotency key. When set, the engine dedups submissions
  // against the (service, handler, object_key, idempotency_key) tuple
  // so a retried Submit returns the same invocation_id.
  string idempotency_key = 5;
  // Opaque caller-supplied metadata, persisted with the invocation and
  // surfaced to the handler via ctx.Metadata(). Typical use is for
  // webhook-style adapters: an HTTP middleware verifies a vendor
  // signature (Stripe-Signature, X-GitHub-Event, …) and stashes the
  // verified facts here so the durable handler can route without
  // re-verifying. The engine never interprets the values — they ride
  // along on JEInput and reach the SDK as InputCommandMessage.headers.
  map<string, string> metadata = 6;
}

message SubmitInvocationResponse {
  reflow.engine.v1.InvocationId invocation_id = 1;
  // String form of the invocation ID, for users that pass it back via URL.
  // Format: "inv_<partition_key:base16>_<uuid:base32>".
  string invocation_id_str = 2;
}

message AwaitInvocationRequest {
  // Either a stringified id (preferred) or the raw struct.
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
  // Server-side timeout in milliseconds. Capped at 60_000 by the server.
  uint32 timeout_ms = 3;
}

message AwaitInvocationResponse {
  bytes output = 1;
  string failure_message = 2;
  bool completed = 3;
  // failure_code mirrors InvocationStatus.Completed.failure_code so
  // callers can distinguish typed failures (e.g. 9002 for cancellation)
  // from plain string messages.
  uint32 failure_code = 4;
}

message ResolveAwakeableRequest {
  // Awakeable identifier (format "awk_<22 base64url chars>").
  string awakeable_id = 1;
  bytes value = 2;
  // If set, the awakeable is rejected with this failure message rather
  // than resolved with `value`.
  string failure_message = 3;
}

message ResolveAwakeableResponse {
  bool resolved = 1;
}

message DescribeInvocationRequest {
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message DescribeInvocationResponse {
  reflow.engine.v1.InvocationStatus status = 1;
}

message AttachInvocationRequest {
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
  // Server-side timeout in milliseconds. 0 means use the
  // default-deadline interceptor's bound (2s). Capped at 60_000 by the
  // server.
  uint32 timeout_ms = 3;
}

message AttachInvocationResponse {
  bytes output = 1;
  string failure_message = 2;
  bool completed = 3;
  uint32 failure_code = 4;
}

message GetInvocationOutputRequest {
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message GetObjectStateRequest {
  string service = 1;
  string object_key = 2;
  string state_key = 3;
}

message GetObjectStateResponse {
  // Raw state value bytes. Empty when present=false.
  bytes value = 1;
  // True when a row exists for (service, object_key, state_key); false
  // when absent. Distinguishes "absent" from "present-but-empty".
  bool present = 2;
}

message GetInvocationOutputResponse {
  enum Status {
    PENDING = 0;
    COMPLETED_OK = 1;
    COMPLETED_FAILED = 2;
    UNKNOWN = 3;
  }
  Status status = 1;
  bytes output = 2;
  string failure_message = 3;
  uint32 failure_code = 4;
}

message CancelInvocationRequest {
  // Either a stringified id (preferred) or the raw struct.
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message CancelInvocationResponse {
  // accepted is true when the cancellation request was routed and
  // proposed. It does not wait for the receiver to apply — callers that
  // need to confirm termination should poll AwaitInvocation /
  // GetInvocationOutput.
  bool accepted = 1;
}

message PurgeInvocationRequest {
  // Either a stringified id (preferred) or the raw struct.
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message PurgeInvocationResponse {
  // accepted is true when the purge was routed and proposed. It does not
  // wait for apply; the rows are gone once the proposal commits.
  bool accepted = 1;
}

message StartProcessRequest {
  // model_ref.kind is "bpmn" or "cmmn"; model_ref.name is the routing service;
  // model_ref.version pins the model snapshot the worker resolves.
  reflow.engine.v1.ModelRef model_ref = 1;
  // Optional caller-chosen instance key. Empty → the server mints a random one.
  string instance_key = 2;
  // Start variables: a JSON object merged into the new instance.
  bytes vars = 3;
}

message StartProcessResponse {
  // Banded partition_key the instance was routed to.
  fixed64 pk = 1;
  // The instance key — echoed, or the server-minted one when the request left
  // it empty.
  string instance_key = 2;
}

message DeliverMessageRequest {
  string message_name = 1;
  string correlation_key = 2;
  // Message body: a JSON object of variables merged into each matched instance.
  bytes payload = 3;
}

message DeliverMessageResponse {
  // Banded partition_key the message was routed to (debug/observability).
  fixed64 pk = 1;
  // accepted is true when the command was routed and proposed; it does not wait
  // for apply, nor report how many subscribers matched.
  bool accepted = 2;
}

message GetProcessInstanceRequest {
  // model_ref.name + the caller's tenant + instance_key select the routing
  // partition (model_ref.kind/version are ignored for the read).
  reflow.engine.v1.ModelRef model_ref = 1;
  string instance_key = 2;
}

message GetProcessInstanceResponse {
  // present is false when no record exists — never started, or terminal and
  // reaped (ProcessTerminal.retention_ms==0, or the history window elapsed). A
  // terminal instance with a non-zero retention_ms stays present=true with a
  // terminal status until its history window elapses.
  bool present = 1;
  // The remaining fields are meaningful only when present=true.
  reflow.engine.v1.ProcessStatus status = 2;
  reflow.engine.v1.ProcessKind kind = 3;
  // active_seq is the seq of the turn in flight, or 0 when the instance is idle
  // (parked on a timer or message/signal wait). next_seq is the inbox append
  // cursor; next_seq-1-active_seq is the count of queued-but-not-yet-run events.
  uint64 active_seq = 4;
  uint64 next_seq = 5;
  // outstanding is the authoritative count of dispatched work that will feed back
  // on its own — service tasks, child processes, armed timers. With active_seq==0,
  // next_seq==active_seq+1, and outstanding==0 the instance is genuinely quiescent
  // (parked on an external message/signal); any of the three non-zero means it
  // will progress without external input. Lets a caller distinguish "working"
  // from "parked" without timing heuristics.
  uint32 outstanding = 6;
  // Terminal / history fields, populated when present=true and the instance is
  // terminal (status COMPLETED/FAILED) within its retention window. output is the
  // completed instance's output (empty on failure); created_at_ms / ended_at_ms
  // bracket the instance lifetime.
  bytes output = 7;
  uint64 created_at_ms = 8;
  uint64 ended_at_ms = 9;
}

message ListProcessInstancesRequest {
  // model_ref.name (when set) filters to one model; empty lists every model in
  // the caller's tenant band. model_ref.kind/version are ignored.
  reflow.engine.v1.ModelRef model_ref = 1;
  // Optional status filter; empty = any status.
  repeated reflow.engine.v1.ProcessStatus status_filter = 2;
  // Max rows to return; 0 = the server default cap.
  uint32 limit = 3;
}

message ListProcessInstancesResponse {
  repeated ProcessInstanceSummary instances = 1;
}

message ProcessInstanceSummary {
  string service = 1;
  string instance_key = 2;
  reflow.engine.v1.ProcessStatus status = 3;
  reflow.engine.v1.ProcessKind kind = 4;
  uint64 active_seq = 5;
  uint64 next_seq = 6;
  uint32 outstanding = 7;
  uint64 created_at_ms = 8;
  uint64 ended_at_ms = 9;
}

message ListInvocationsRequest {
  // service (when set) filters to one target service; empty lists every service
  // in the caller's tenant band.
  string service = 1;
  // Optional state filter; empty = any state.
  repeated reflow.engine.v1.InvocationState state_filter = 2;
  // Max rows to return; 0 = the server default cap.
  uint32 limit = 3;
}

message ListInvocationsResponse {
  repeated InvocationSummary invocations = 1;
}

message InvocationSummary {
  reflow.engine.v1.InvocationId id = 1;
  reflow.engine.v1.InvocationTarget target = 2;
  reflow.engine.v1.InvocationState state = 3;
  string deployment_id = 4;
  uint64 created_at_ms = 5;
  uint64 completed_at_ms = 6;
}

message ResolveWorkflowPromiseRequest {
  string service = 1;
  string workflow_key = 2;
  string promise_name = 3;
  // value and failure_message are mutually exclusive; supplying both
  // routes as a rejection (failure_message wins).
  bytes value = 4;
  string failure_message = 5;
}

message ResolveWorkflowPromiseResponse {
  // accepted is true when the resolve request was routed and the
  // command was proposed. Conflicts with an already-completed promise
  // are not reflected here — callers that need to detect "loser" can
  // re-read state via the workflow's own Peek (or AwaitInvocation if
  // the workflow's output already reflects the promise).
  bool accepted = 1;
}
