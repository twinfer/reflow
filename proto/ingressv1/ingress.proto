// Reflow ingress service.
//
// Exposes the user-facing entrypoints for submitting invocations, awaiting
// their results, and resolving awakeables. Dual-served over gRPC and
// HTTP/JSON via grpc-gateway annotations. See SAD §10 for routing rules; in
// Phase 2 the deployment is single-partition (shard 1).
syntax = "proto3";

package reflow.ingress.v1;

import "enginev1/engine.proto";
import "google/api/annotations.proto";

option go_package = "github.com/twinfer/reflow/proto/ingressv1;ingressv1";

service Ingress {
  // SubmitInvocation enqueues a new invocation. Returns the minted invocation
  // ID; the caller polls AwaitInvocation (or relies on response routing once
  // Phase 5 SSE lands) for the result.
  rpc SubmitInvocation(SubmitInvocationRequest) returns (SubmitInvocationResponse) {
    option (google.api.http) = {
      post: "/invocation/{service}/{handler}"
      body: "*"
    };
  }

  // AwaitInvocation blocks (up to deadline) until the named invocation
  // reaches Completed and returns its output. Currently implemented via
  // server-side polling of SyncRead; SSE/streaming is Phase 5.
  rpc AwaitInvocation(AwaitInvocationRequest) returns (AwaitInvocationResponse) {
    option (google.api.http) = {
      post: "/await/{invocation_id}"
      body: "*"
    };
  }

  // ResolveAwakeable completes an outstanding awakeable previously created
  // by a handler via ctx.Awakeable(). Routes to the owning partition by
  // looking up the awakeable directory.
  rpc ResolveAwakeable(ResolveAwakeableRequest) returns (ResolveAwakeableResponse) {
    option (google.api.http) = {
      post: "/awakeable/{awakeable_id}/resolve"
      body: "*"
    };
  }

  // ListPartitions reports the partitions hosted on this node and their
  // leadership state. Read-only debug endpoint.
  rpc ListPartitions(ListPartitionsRequest) returns (ListPartitionsResponse) {
    option (google.api.http) = {
      get: "/admin/partitions"
    };
  }

  // DescribeInvocation returns the current status of an invocation without
  // blocking. Read-only debug endpoint.
  rpc DescribeInvocation(DescribeInvocationRequest) returns (DescribeInvocationResponse) {
    option (google.api.http) = {
      get: "/admin/invocation/{invocation_id}"
    };
  }

  // AttachInvocation blocks (up to deadline) on an existing invocation and
  // returns its outcome once Completed. Same shape as AwaitInvocation but
  // explicit about attaching to an already-submitted invocation by id.
  // Phase 3.
  rpc AttachInvocation(AttachInvocationRequest) returns (AttachInvocationResponse) {
    option (google.api.http) = {
      post: "/attach/{invocation_id}"
      body: "*"
    };
  }

  // GetInvocationOutput is a non-blocking lookup of an invocation's current
  // outcome. Returns PENDING for still-running invocations, COMPLETED_OK /
  // COMPLETED_FAILED for terminated ones, UNKNOWN if no such invocation is
  // known to this node. Phase 3.
  rpc GetInvocationOutput(GetInvocationOutputRequest) returns (GetInvocationOutputResponse) {
    option (google.api.http) = {
      get: "/output/{invocation_id}"
    };
  }
}

message SubmitInvocationRequest {
  // Path-bound: service name (e.g. "Greeter").
  string service = 1;
  // Path-bound: handler name (e.g. "hello").
  string handler = 2;
  // Optional object key. Empty for unkeyed services.
  string object_key = 3;
  // Handler input bytes (JSON, proto, anything — the SDK opaquely passes it
  // through). For HTTP/JSON callers this comes in as base64 — grpc-gateway
  // handles the bytes encoding.
  bytes input = 4;
  // Optional idempotency key. Phase 3 honors this for dedup; Phase 2
  // ignores it (treated as a hint only).
  string idempotency_key = 5;
}

message SubmitInvocationResponse {
  reflow.engine.v1.InvocationId invocation_id = 1;
  // String form of the invocation ID, for users that pass it back via URL.
  // Format: "inv_<partition_key:base16>_<uuid:base32>". Stable across phases.
  string invocation_id_str = 2;
}

message AwaitInvocationRequest {
  // Either a stringified id (preferred) or the raw struct.
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
  // Server-side timeout in milliseconds. Capped at 60_000 by the server.
  uint32 timeout_ms = 3;
}

message AwaitInvocationResponse {
  bytes output = 1;
  string failure_message = 2;
  bool completed = 3;
}

message ResolveAwakeableRequest {
  // Awakeable identifier (format "awk_<22 base64url chars>").
  string awakeable_id = 1;
  bytes value = 2;
  // If set, the awakeable is rejected with this failure message rather than
  // resolved with `value`.
  string failure_message = 3;
}

message ResolveAwakeableResponse {
  bool resolved = 1;
}

message ListPartitionsRequest {}

message ListPartitionsResponse {
  repeated PartitionInfo partitions = 1;
}

message PartitionInfo {
  uint64 shard_id = 1;
  bool is_leader = 2;
  uint64 leader_epoch = 3;
}

message DescribeInvocationRequest {
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message DescribeInvocationResponse {
  reflow.engine.v1.InvocationStatus status = 1;
}

message AttachInvocationRequest {
  // Path-bound stringified id (preferred).
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
  // Server-side timeout in milliseconds. 0 means use the default-deadline
  // interceptor's bound (2s). Capped at 60_000 by the server.
  uint32 timeout_ms = 3;
}

message AttachInvocationResponse {
  bytes output = 1;
  string failure_message = 2;
  bool completed = 3;
}

message GetInvocationOutputRequest {
  string invocation_id = 1;
  reflow.engine.v1.InvocationId invocation_id_proto = 2;
}

message GetInvocationOutputResponse {
  enum Status {
    PENDING = 0;
    COMPLETED_OK = 1;
    COMPLETED_FAILED = 2;
    UNKNOWN = 3;
  }
  Status status = 1;
  bytes output = 2;
  string failure_message = 3;
}
