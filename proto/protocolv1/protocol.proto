// Reflow service protocol v1 — engine ↔ handler wire format.
//
// The transport is Connect RPC over HTTP/2 (h2c plaintext or HTTPS).
// The engine opens HandlerService.InvokeStream — a bidi stream of
// protocolv1.Frame envelopes — for each invocation. Routing
// (service_name, handler_name) flows inside StartMessage. Capability
// discovery is a separate one-shot probe defined in
// proto/discoveryv1/discovery.proto (GET /discover).
//
// Wire framing: each message is prefixed by a 64-bit big-endian header
// (16-bit type code | 16-bit flags | 32-bit payload length), followed
// by the protobuf payload. Type codes are namespaced: 0x0000-0x00FF
// are core lifecycle frames, 0x0400-0x04FF are command messages
// (replicated journal entries created by the SDK during processing),
// 0x8000-0x80FF are notification messages (completion + signal results
// delivered from engine to SDK).
//
// This file defines only the message shapes used as payloads inside the
// frame envelope. There are no gRPC services here — the handler-side
// SDK is an HTTP/2 server, the engine an HTTP/2 client.
//
// Inspired by the Restate service-protocol v7 journal-v2 model
// (https://github.com/restatedev/service-protocol, MIT-licensed,
// (c) 2023 Restate Software, Inc., Restate GmbH). The message shapes
// and Command/Notification split derive from that design; field
// numbering, package, comment prose, and message set are reflow's.
syntax = "proto3";

package reflow.protocol.v1;

option go_package = "github.com/twinfer/reflow/proto/protocolv1;protocolv1";

// Frame is the on-the-wire envelope. payload is a protobuf-encoded
// message whose concrete type is determined by the header's type code.
message Frame {
  // 16-bit type | 16-bit flags | 32-bit length, packed big-endian.
  uint64 header = 1;
  bytes payload = 2;
  // On engine→SDK replay frames, slot identifies the journal index
  // this entry occupies. Lets the SDK build its replay map without
  // decoding payloads to extract completion_id / matching awakeable
  // id. SDK→engine frames leave it unset (engine doesn't track a
  // replay map); reflow's wire is happy with the field defaulting to 0.
  uint32 slot = 3;
}

// Kind classifies the handler addressing model. Stamped at deployment
// registration; echoed on StartMessage so the SDK can validate.
enum Kind {
  KIND_UNSPECIFIED = 0;
  // Stateless per-invocation handler. Address: (service_name, "").
  KIND_SERVICE = 1;
  // Keyed, locked-per-key, stateful object. Address: (service_name, object_key).
  KIND_OBJECT = 2;
  // One run per (workflow_name, workflow_key). Long-lived; supports promises.
  // The "main" entry point that drives the workflow lifecycle: submit dedup,
  // completion retention, state persistence past run completion.
  KIND_WORKFLOW = 3;
  // Shared handler on a workflow. Concurrent calls allowed, addressed by
  // (workflow_name, workflow_key); reads/writes workflow state and promises
  // without driving lifecycle.
  KIND_WORKFLOW_SHARED = 4;
}

// ----------------------------------------------------------------------
// Core lifecycle frames (type codes 0x0000-0x00FF)
// ----------------------------------------------------------------------

// Type: 0x0000
// Sent by the engine to open an invocation. The SDK MUST receive
// exactly one StartMessage as the first frame on the stream.
message StartMessage {
  message StateEntry {
    bytes key = 1;
    // Empty bytes encodes an empty value, not absence.
    bytes value = 2;
  }

  // Invocation id, 16 bytes (UUIDv4 or deterministic from idempotency_token).
  bytes id = 1;

  // Display id for logging / introspection.
  string debug_id = 2;

  // Sum of commands + notifications already journaled. Tells the SDK how
  // far through replay it is when it sees this StartMessage.
  uint32 known_entries = 3;

  // Eager K/V snapshot delivered with the start. May be partial; if
  // partial_state is true, missing keys must be fetched via
  // GetLazyStateCommandMessage.
  repeated StateEntry state_map = 4;
  bool partial_state = 5;

  // For KIND_OBJECT and KIND_WORKFLOW: the addressing key.
  string key = 6;

  // Best-effort hint for retry-backoff observability. Not durably stored.
  uint32 retry_count_since_last_stored_entry = 7;
  uint64 duration_since_last_stored_entry = 8;

  // Seed for the SDK's deterministic RNG. Stable across restarts.
  uint64 random_seed = 9;

  // Service + handler the engine is invoking. Connect RPC carries no
  // per-handler addressing on the URL, so these fields are the
  // authoritative routing source — the handler-side server resolves
  // (service_name, handler_name) directly from StartMessage.
  string service_name = 10;
  string handler_name = 11;

  // Handler classification — echoes the deployment registration.
  Kind kind = 13;

  // Owner invocation's partition_key. Reflow-specific routing hint —
  // wireContext.Awakeable mints awakeable ids whose body encodes this
  // value (after a 4-byte tenant prefix) so ingress.ResolveAwakeable can
  // route to the owning shard with a single read.
  fixed64 partition_key = 14;

  // Per-invocation cap on journal entries (steps). Echoed from the
  // resolved DeploymentRecord (engine default 10_000 when the
  // deployment didn't set one). SDK pre-flights allocSlot against
  // this so handlers see a clean *Failure rather than a torn-down
  // session when the budget is exhausted.
  uint32 max_journal_entries = 15;

  // Owner invocation's tenant id. Reflow-specific; lets the handler-side
  // wireContext.Awakeable embed tenant in minted awakeable ids
  // ([4B tenant][8B partition_key][8B random]) so ingress.ResolveAwakeable
  // keys the awakeable directory row under the owner's tenant.
  uint32 owner_tenant = 16;
}

// Type: 0x0001
// Sent by the SDK to suspend the invocation. The engine treats this as
// "park until any awaited notification arrives, then resume."
message SuspensionMessage {
  // Notification ids the invocation is blocked on.
  repeated uint32 waiting_completions = 1;
  repeated uint32 waiting_signals = 2;
  repeated string waiting_named_signals = 3;
}

// Type: 0x0002
// Sent by the SDK to terminate the invocation with a non-recoverable
// failure. Distinct from a Failure value returned from a handler:
// ErrorMessage means "the SDK itself encountered a fatal protocol or
// runtime condition" — e.g. journal mismatch.
message ErrorMessage {
  // HTTP-style status code. Reserved codes:
  //   570 = JOURNAL_MISMATCH (SDK cannot replay due to code change)
  //   571 = PROTOCOL_VIOLATION (unexpected message variant)
  uint32 code = 1;
  string message = 2;
  string stacktrace = 3;

  // Optional pointer to the journal entry that triggered the failure.
  optional uint32 related_command_index = 4;
  optional string related_command_name = 5;
  optional uint32 related_command_type = 6;

  // SDK-supplied override for the next retry delay (milliseconds).
  optional uint64 next_retry_delay = 8;
}

// Type: 0x0003
// Sent by the SDK when the invocation lifecycle terminates cleanly
// (whether successfully or with a handler-returned Failure).
message EndMessage {}

// Type: 0x0004
// Sent by the engine to acknowledge that a command from the SDK has
// been durably journaled.
message CommandAckMessage {
  uint32 command_index = 1;
}

// Type: 0x0005
// Special control frame for ctx.run completions. The SDK proposes the
// run result; the engine durably stores it and later delivers a
// RunCompletionNotificationMessage.
message ProposeRunCompletionMessage {
  uint32 result_completion_id = 1;
  // Reflow extension to Restate's service-protocol: when the SDK
  // classified fn's error as transient (any non-*Failure error), the
  // engine should journal JERun with retryable=true and schedule a
  // backoff timer rather than recording a terminal failure. The next
  // session re-invocation re-executes fn with attempt+1.
  bool retryable = 2;
  // Caller-supplied retry policy for this ctx.Run site. Zero/absent
  // max_attempts means "use deployment default" (currently 1 — no retry).
  // Engine reads this on every JERunProposal so per-call policies can
  // vary across Run invocations within the same handler. Zero/absent
  // backoff fields fall back to engine defaults (50ms/x2/10s cap).
  RunRetryPolicy retry_policy = 3;
  oneof result {
    bytes value = 14;
    Failure failure = 15;
  }
}

// RunRetryPolicy is the wire-side mirror of enginev1.RunRetryPolicy.
// Kept in protocolv1 so pkg/handler doesn't import enginev1 — the
// invoker translates between the two at the wire boundary.
message RunRetryPolicy {
  uint64 initial_interval_ms = 1;
  double factor = 2;
  uint64 max_interval_ms = 3;
  // Max total attempts (initial run + retries combined). 0 = use
  // deployment default. 1 = no retry. To request unbounded retries set
  // an explicit large value (e.g. math.MaxUint32).
  uint32 max_attempts = 4;
}

// ----------------------------------------------------------------------
// Command messages (type codes 0x0400-0x04FF)
// Created by the SDK during user-code execution; durably journaled.
// ----------------------------------------------------------------------

// Type: 0x0400
// First entry on every journal. Carries the invocation's input payload.
message InputCommandMessage {
  repeated Header headers = 1;
  Value value = 14;
  string name = 12;
}

// Type: 0x0401
// Final command. Carries the invocation's output (success or failure).
message OutputCommandMessage {
  oneof result {
    Value value = 14;
    Failure failure = 15;
  }
  string name = 12;
}

// Type: 0x0402
message GetLazyStateCommandMessage {
  bytes key = 1;
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x8002 — notification for GetLazyStateCommandMessage.
message GetLazyStateCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Void void = 4;
    Value value = 5;
  }
}

// Type: 0x0403
message SetStateCommandMessage {
  bytes key = 1;
  Value value = 3;
  string name = 12;
}

// Type: 0x0404
message ClearStateCommandMessage {
  bytes key = 1;
  string name = 12;
}

// Type: 0x0405
message ClearAllStateCommandMessage {
  string name = 12;
}

// Type: 0x0406
message GetLazyStateKeysCommandMessage {
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x8006 — notification for GetLazyStateKeysCommandMessage.
message GetLazyStateKeysCompletionNotificationMessage {
  uint32 completion_id = 1;
  StateKeys state_keys = 17;
}

// Type: 0x0408
// "Eager" keys are served from the local view (StartMessage.state_map
// plus session writes) — no completion notification is needed; the
// SDK ships the sorted key list inline and the engine stamps it as-is.
//
// Note: the per-key counterpart (was 0x0407 GetEagerStateCommandMessage)
// is intentionally absent. Reflow does not journal cache-hit GetState
// reads — see durable-execution-go-sad.md §6.10.3.
message GetEagerStateKeysCommandMessage {
  StateKeys value = 14;
  string name = 12;
}

// Type: 0x0409
message GetPromiseCommandMessage {
  string key = 1;
  uint32 result_completion_id = 11;
  string name = 12;
  // service is the explicit promise scope. Existing Promise(name) callers
  // set it to the calling invocation's own service; WorkflowPromise(target,
  // name) callers set target.Service. Required: the apply path uses it +
  // key to locate the promise row, not statusTarget(cur).
  string service = 13;
}

// Type: 0x8009 — notification for GetPromiseCommandMessage.
message GetPromiseCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Value value = 5;
    Failure failure = 6;
  }
}

// Type: 0x040A
// Non-blocking snapshot of a workflow-scoped named promise. Single-slot:
// the apply arm reads PromiseValue and stamps the snapshot directly onto
// the journal entry (completed flag + value/failure). Store-only on replay.
message PeekPromiseCommandMessage {
  string key = 1;
  // Filled by the apply arm on first dispatch — not by the SDK. The
  // SDK echoes the resulting snapshot on replay via the same fields.
  bool completed = 2;
  oneof result {
    Value value = 3;
    Failure failure = 4;
  }
  string name = 12;
  // service is the explicit promise scope (see GetPromiseCommandMessage).
  string service = 13;
}

// Type: 0x800A — notification for PeekPromiseCommandMessage. Reserved
// for symmetry with Get/CompletePromise; Peek is single-slot and the
// payload is inlined on the command frame, so the engine never emits
// a separate notification today.
message PeekPromiseCompletionNotificationMessage {
  uint32 completion_id = 1;
  bool completed = 2;
  oneof result {
    Value value = 3;
    Failure failure = 4;
  }
}

// Type: 0x040B
// Completes a workflow-scoped named promise. Single-shot: a second
// CompletePromise on the same key is a journal-mismatch error.
message CompletePromiseCommandMessage {
  string key = 1;
  oneof completion {
    Value completion_value = 2;
    Failure completion_failure = 3;
  }
  uint32 result_completion_id = 11;
  string name = 12;
  // service is the explicit promise scope (see GetPromiseCommandMessage).
  // When (service, key) hashes to a different shard than the caller's
  // partition, the apply path routes the completion via OutboxEnvelope
  // .PromiseCompletion + .PromiseCompletionAck round-trip.
  string service = 13;
}

// Type: 0x800B — notification for CompletePromiseCommandMessage.
message CompletePromiseCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Void void = 4;
    Failure failure = 6;
  }
}

// Type: 0x040C
message SleepCommandMessage {
  // Wake-up time, milliseconds since UNIX epoch.
  uint64 wake_up_time = 1;
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x800C — notification for SleepCommandMessage.
message SleepCompletionNotificationMessage {
  uint32 completion_id = 1;
  Void void = 4;
}

// Type: 0x040D
// Synchronous call. Yields two completion notifications: first the
// invocation_id of the callee, then the result.
message CallCommandMessage {
  string service_name = 1;
  string handler_name = 2;
  bytes parameter = 3;
  repeated Header headers = 4;
  // For KIND_OBJECT / KIND_WORKFLOW targets.
  string key = 5;

  // Caller-supplied idempotency token. Same token within the
  // configured retention window deduplicates against an earlier call
  // and returns its result. Wired to the journal-level
  // dedup/arbitrary/<producer_id>/<seq> machinery.
  optional string idempotency_token = 6;

  uint32 invocation_id_notification_idx = 10;
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x800E — first notification for CallCommandMessage.
message CallInvocationIdCompletionNotificationMessage {
  uint32 completion_id = 1;
  string invocation_id = 16;
}

// Type: 0x800D — final notification for CallCommandMessage.
message CallCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Value value = 5;
    Failure failure = 6;
  }
}

// Type: 0x040E
// Fire-and-forget. Yields only the invocation_id notification; result
// must be retrieved later via AttachInvocation or GetInvocationOutput.
message OneWayCallCommandMessage {
  string service_name = 1;
  string handler_name = 2;
  bytes parameter = 3;
  // Earliest dispatch time, milliseconds since UNIX epoch. Zero/past =
  // dispatch immediately.
  uint64 invoke_time = 4;
  repeated Header headers = 5;
  string key = 6;
  optional string idempotency_token = 7;
  uint32 invocation_id_notification_idx = 10;
  string name = 12;
}

// Type: 0x0411
// Marker for a ctx.run side effect. The actual result is sent later
// via ProposeRunCompletionMessage. On the engine→SDK replay path
// after a retryable failure, attempt + idempotency_key are stamped so
// the SDK exposes them to fn via RunContext.
message RunCommandMessage {
  uint32 result_completion_id = 11;
  string name = 12;
  // 1-based attempt counter. Engine fills it in on replay; SDK-sent
  // RunCommandMessage frames after a fresh execution may also carry
  // it for debugging — the engine ignores it (apply path is
  // authoritative on attempt count).
  uint32 attempt = 13;
  // Stable token for this (invocation, slot, attempt). Engine derives
  // it as hex(sha256(invocation_id||slot||attempt))[:16] on replay.
  // The SDK threads it through external API calls so retries dedupe
  // downstream.
  string idempotency_key = 14;
}

// Type: 0x8011 — notification for RunCommandMessage.
message RunCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Value value = 5;
    Failure failure = 6;
  }
}

// Type: 0x0412
// Subscribe to the result of an existing invocation.
message AttachInvocationCommandMessage {
  oneof target {
    string invocation_id = 1;
    WorkflowTarget workflow_target = 4;
  }
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x8012 — notification for AttachInvocationCommandMessage.
message AttachInvocationCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Value value = 5;
    Failure failure = 6;
  }
}

// Type: 0x0413
// Read the final result of a completed invocation, non-blocking.
message GetInvocationOutputCommandMessage {
  oneof target {
    string invocation_id = 1;
    WorkflowTarget workflow_target = 4;
  }
  uint32 result_completion_id = 11;
  string name = 12;
}

// Type: 0x8013 — notification for GetInvocationOutputCommandMessage.
message GetInvocationOutputCompletionNotificationMessage {
  uint32 completion_id = 1;
  oneof result {
    Void void = 4;
    Value value = 5;
    Failure failure = 6;
  }
}

// Type: 0x0414
// SDK→engine: mint an awakeable bound to the current invocation. The
// SDK generates the id deterministically (binding the owner's
// partition_key in the first 8 bytes); the engine writes JEAwakeable
// at the supplied slot and rows the id into the awakeable directory so
// ingress.ResolveAwakeable can find it. The resolution arrives later
// as SignalNotificationMessage{name=awakeable_id}.
message AwakeableCommandMessage {
  uint32 result_completion_id = 1;
  string awakeable_id = 2;
}

// Type: 0x0415
// SDK→engine: deliver a named signal to another invocation, addressed
// by Target (service + handler + key). The receiver-side apply arm
// resolves Target → active InvocationId via KeyLeaseTable before
// dispatching the signal. Target.key must be non-empty (signals are
// only valid for keyed services — Virtual Objects and Workflows);
// signaling an unkeyed Target is rejected at the SDK boundary.
message SendSignalCommandMessage {
  string service_name = 1;
  string handler_name = 2;
  string key = 3;
  string signal_name = 4;
  bytes payload = 5;
}

// Type: 0x0416
// SDK→engine: register interest in a named signal. Two-slot — this
// command at cmd_slot, the resolution arrives as a
// SignalNotificationMessage at result_completion_id (= cmd_slot + 1).
// The engine writes a SignalAwaiter directory row keyed by (inv, name)
// and probes the inbox; on hit the result lands synchronously in the
// same apply batch, on miss the awaiter waits for a future
// InvokerEffect.SignalDelivered.
message AwaitSignalCommandMessage {
  string signal_name = 1;
  uint32 result_completion_id = 2;
}

// ----------------------------------------------------------------------
// Signal notification (type code 0xFBFF)
// ----------------------------------------------------------------------

// Delivered to the SDK out-of-band when an awakeable resolves or (in
// future) when a cancel signal arrives. v1 only emits the `name`
// variant; the `idx` slot is reserved for future numbered signals.
message SignalNotificationMessage {
  oneof signal_id {
    uint32 idx = 2;
    string name = 3;
  }
  oneof result {
    Void void = 4;
    Value value = 5;
    Failure failure = 6;
  }
}

// ----------------------------------------------------------------------
// Shared types
// ----------------------------------------------------------------------

message StateKeys {
  repeated bytes keys = 1;
}

message Value {
  bytes content = 1;
}

// User-visible failure. Carried on OutputCommandMessage when a handler
// returns *Failure, on CallCompletion when a call target returned
// *Failure, etc.
message Failure {
  uint32 code = 1;
  string message = 2;
}

message Header {
  string key = 1;
  string value = 2;
}

// Address of a workflow run.
message WorkflowTarget {
  string workflow_name = 1;
  string workflow_key = 2;
}

// Sentinel "no value" — distinguished from "value = empty bytes".
message Void {}
